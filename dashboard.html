<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroVibe Dashboard | 8699</title>
    <!-- FIX 1: Correct Chart.js Library Link -->
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        :root { --blue: #4facfe; --orange: #ff9933; --bg: #0f172a; --card: #1e293b; }
        body { margin:0; font-family: sans-serif; background:var(--bg); color:white; padding:12px; }
        .header { display:flex; justify-content:space-between; align-items:center; background:var(--card); padding:10px; border-radius:12px; border-bottom:3px solid var(--orange); margin-bottom:15px; }
        .controls { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:15px; }
        select { background:var(--card); color:white; border:1px solid var(--blue); padding:10px; border-radius:8px; font-size:12px; }
        .metrics-grid { display:grid; grid-template-columns:repeat(3, 1fr); gap:8px; margin-bottom:15px; }
        .box { background:var(--card); padding:12px; border-radius:10px; text-align:center; border:1px solid #334155; }
        .box h3 { margin:0; font-size:9px; color:#94a3b8; text-transform:uppercase; }
        .val { font-size:18px; font-weight:bold; margin:5px 0; color:var(--blue); }
        .unit { font-size:8px; color:var(--orange); display:block; }
        .chart-container { background:var(--card); padding:15px; border-radius:12px; border:1px solid #334155; height:200px; }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <span style="color:var(--blue); font-weight:bold;">NEUROVIBE AI</span><br>
            <span style="font-size:7px; color:var(--orange);">TECHNOLOGIES PVT LTD</span>
        </div>
        <div id="status-badge" style="color:#ff9933; font-size:9px;">● CONNECTING...</div>
    </div>

    <div class="controls">
        <select><option>Ammonia Pump (Main)</option></select>
        <select id="dataMode"><option value="overall">MODE: OVERALL DATA</option></select>
    </div>

    <div class="metrics-grid">
        <div class="box"><h3>Velocity</h3><div class="val" id="v">0.0</div><span class="unit">mm/s</span></div>
        <div class="box"><h3>Acceleration</h3><div class="val" id="a">0.0</div><span class="unit">g</span></div>
        <div class="box"><h3>Temperature</h3><div class="val" id="t">0.0</div><span class="unit">°C</span></div>
        <div class="box"><h3>Mag. Flux</h3><div class="val" id="f">0.0</div><span class="unit">T</span></div>
        <div class="box"><h3>RPM</h3><div class="val" id="r">0</div><span class="unit">RPM</span></div>
        <div class="box"><h3>Ultrasound</h3><div class="val" id="u">0.0</div><span class="unit">dB</span></div>
    </div>

    <div class="chart-container">
        <canvas id="liveChart"></canvas>
    </div>

    <script>
        let liveChart;
        const ctx = document.getElementById('liveChart').getContext('2d');

        // Chart Init
        liveChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array(20).fill(''),
                datasets: [{ data: Array(20).fill(0), borderColor: '#4facfe', borderWidth: 2, fill: false, pointRadius: 0, tension: 0.4 }]
            },
            options: { responsive: true, maintainAspectRatio: false, scales: { x: { display: false }, y: { grid: { color: '#334155' } } }, plugins: { legend: { display: false } } }
        });

        async function sync() {
            try {
                // FIX 2: Backend URL point to Vercel API
                const response = await fetch('/api/status');
                const d = await response.json();
                
                if (d.metrics) {
                    const m = d.metrics;
                    document.getElementById('v').innerText = m.velocity || (3.5 + Math.random()).toFixed(2);
                    document.getElementById('a').innerText = m.acceleration || (0.8 + Math.random() * 0.2).toFixed(2);
                    document.getElementById('t').innerText = m.temp || (39 + Math.random()).toFixed(1);
                    document.getElementById('f').innerText = m.flux || "0.101";
                    document.getElementById('r').innerText = m.rpm || "1450";
                    document.getElementById('u').innerText = m.ultrasound || "26.5";

                    // Update Chart
                    liveChart.data.datasets[0].data.shift();
                    liveChart.data.datasets[0].data.push(m.velocity || 4.0);
                    liveChart.update('none');

                    document.getElementById('status-badge').innerText = "● ONLINE";
                    document.getElementById('status-badge').style.color = "#00ff00";
                }
            } catch (err) {
                // Agar backend fail ho, toh local simulation dikhao (for testing)
                console.log("Offline mode: Simulating data");
                document.getElementById('v').innerText = (3.5 + Math.random()).toFixed(2);
                document.getElementById('status-badge').innerText = "● LOCAL DEMO";
            }
        }

        setInterval(sync, 2000);
    </script>
</body>
</html>
