<!-- NeuroVibe Real-time Dashboard -->
<div style="background: #121212; padding: 20px; color: #FF9933;">
    <div style="display: flex; justify-content: space-between;">
        <h3>Machine Health: NV-8699</h3>
        <p id="status">Status: <span style="color: #00FF00;">ONLINE</span></p>
    </div>

    <!-- Charts Container -->
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <canvas id="vibeChart" style="background: #1e1e1e; border-radius: 10px;"></canvas>
        <canvas id="rpmChart" style="background: #1e1e1e; border-radius: 10px;"></canvas>
    </div>

    <!-- Data Tiles -->
    <div style="display: flex; gap: 15px; margin-top: 20px;">
        <div style="border: 1px solid #FF9933; padding: 10px;">Velocity: <span id="vel">0.0</span> mm/s</div>
        <div style="border: 1px solid #FF9933; padding: 10px;">Temp: <span id="temp">0.0</span>°C</div>
        <div style="border: 1px solid #FF9933; padding: 10px;">Flux: <span id="flux">0.0</span></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net"></script>
<script>
    // Chart Initialization (Bhagwa Theme)
    const ctxVibe = document.getElementById('vibeChart').getContext('2d');
    const vibeChart = new Chart(ctxVibe, {
        type: 'line',
        data: { labels: [], datasets: [{ label: 'Vibration (g)', data: [], borderColor: '#FF9933', tension: 0.3 }] }
    });

    // Real-time Fetch Logic (From Backend)
    function fetchData() {
        fetch('https://predict.nvpredictive.com')
            .then(res => res.json())
            .then(data => {
                // Update UI & Graphs
                document.getElementById('vel').innerText = data.velocity;
                document.getElementById('temp').innerText = data.temperature;
                // Add new data point to Chart
                vibeChart.data.labels.push(new Date().toLocaleTimeString());
                vibeChart.data.datasets[0].data.push(data.vibration_g);
                vibeChart.update();
            });
    }
    setInterval(fetchData, 2000); // 2 Sec Update
</script>
