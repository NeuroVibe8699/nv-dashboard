<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroVibe AI Technologies | Dashboard</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root { --blue: #4facfe; --orange: #ff9933; --bg: #0d1117; --card: #161b22; --border: #30363d; }
        body { margin:0; font-family:'Roboto', sans-serif; background:var(--bg); color:white; padding:12px; }
        
        /* Header Fix: No 8699, Only Full Name */
        .header { display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid var(--orange); padding-bottom:10px; margin-bottom:20px; }
        .logo-section { display:flex; align-items:center; gap:12px; }
        .logo-box { background:white; padding:5px; border-radius:6px; height:35px; width:35px; display:flex; align-items:center; justify-content:center; }
        .brand-text b { font-family:'Orbitron'; color:var(--blue); font-size:16px; letter-spacing:1px; }
        .brand-text small { color:var(--orange); font-size:8px; display:block; font-weight:bold; text-transform:uppercase; }
        .status-tag { color:#00ff00; font-size:10px; font-weight:bold; background:rgba(0,255,0,0.1); padding:4px 10px; border-radius:15px; border:1px solid #00ff00; }

        /* PDF Logic: Site Selection Dropdowns */
        .controls { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px; }
        select { background:var(--card); color:white; border:1px solid var(--blue); padding:10px; border-radius:8px; font-size:12px; outline:none; cursor:pointer; }

        /* 3-Column Grid */
        .grid { display:grid; grid-template-columns:repeat(3, 1fr); gap:10px; margin-bottom:20px; }
        .box { background:var(--card); border:1px solid var(--border); padding:20px 5px; border-radius:10px; text-align:center; transition: 0.3s; }
        .box:hover { border-color: var(--blue); }
        .label { color:#8b949e; font-size:10px; text-transform:uppercase; margin-bottom:10px; letter-spacing:0.5px; }
        .val { font-size:24px; font-weight:bold; color:var(--blue); margin-bottom:5px; }
        .unit { color:var(--orange); font-size:10px; font-weight:bold; }

        /* Graphics Area */
        .chart-card { background:var(--card); border:1px solid var(--border); padding:15px; border-radius:12px; height:220px; }
        .chart-title { color:var(--blue); font-size:11px; margin-bottom:12px; font-family:'Orbitron'; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-section">
            <div class="logo-box">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org"><circle cx="50" cy="50" r="45" fill="#4facfe""")/>><path d="M30 70 L50 30 L70 70 Z" fill="white""")/>><circle cx="50" cy="55" r="10" fill="#ff9933""")/>></svg>
            </div>
            <div class="brand-text">
                <b>NEUROVIBE AI</b>
                <small>Technologies Pvt Ltd</small>
            </div>
        </div>
        <div id="status" class="status-tag">● ONLINE</div>
    </div>

    <!-- PDF Logic: Selection Controls -->
    <div class="controls">
        <select id="siteSelect"><option value="">Select Site (e.g. Ammonia Pump)</option><option value="p1">Ammonia Pump (Main)</option></select>
        <select id="modeSelect"><option value="overall">MODE: OVERALL TREND</option></select>
    </div>

    <div class="grid">
        <div class="box"><div class="label">Velocity</div><div class="val" id="v">0.0</div><div class="unit">MM/S</div></div>
        <div class="box"><div class="label">Acceleration</div><div class="val" id="a">0.0</div><div class="unit">G</div></div>
        <div class="box"><div class="label">Temperature</div><div class="val" id="t">0.0</div><div class="unit">°C</div></div>
        <div class="box"><div class="label">Mag. Flux</div><div class="val" id="f">0.0</div><div class="unit">T</div></div>
        <div class="box"><div class="label">Max RPM</div><div class="val" id="r">0</div><div class="unit">RPM</div></div>
        <div class="box"><div class="label">Ultrasound</div><div class="val" id="u">0.0</div><div class="unit">DB</div></div>
    </div>

    <div class="chart-card">
        <div class="chart-title" id="chartTitle">LIVE VIBRATION TREND</div>
        <canvas id="liveChart" style="width:100%; height:160px;"></canvas>
    </div>

    <script>
        let chart;
        const ctx = document.getElementById('liveChart').getContext('2d');
        
        // Init Graphics
        chart = new Chart(ctx, {
            type: 'line',
            data: { labels: Array(25).fill(''), datasets: [{ data: Array(25).fill(0), borderColor: '#ff9933', borderWidth: 2, fill: true, backgroundColor: 'rgba(255, 153, 51, 0.1)', tension: 0.4, pointRadius: 0 }] },
            options: { responsive:true, maintainAspectRatio:false, scales: { x:{display:false}, y:{grid:{color:'#30363d'}, ticks:{color:'#8b949e', font:{size:9}}} }, plugins:{legend:{display:false}} }
        });

        // Data Read Logic from PDF/API
        async function syncData() {
            const site = document.getElementById('siteSelect').value;
            if(!site) return; // PDF Logic: Sirf site select hone par data dikhao

            try {
                const res = await fetch('/api/status');
                const d = await res.json();
                const m = d.metrics;

                // Value Update
                document.getElementById('v').innerText = m.velocity;
                document.getElementById('a').innerText = m.acceleration;
                document.getElementById('t').innerText = m.temp;
                document.getElementById('f').innerText = m.flux;
                document.getElementById('r').innerText = m.rpm;
                document.getElementById('u').innerText = m.ultrasound;

                // Graphics Update
                chart.data.datasets[0].data.shift();
                chart.data.datasets[0].data.push(m.velocity);
                chart.update('none');

                document.getElementById('status').innerText = "● ONLINE";
                document.getElementById('status').style.color = "#00ff00";
            } catch (e) {
                document.getElementById('status').innerText = "● RECONNECTING...";
                document.getElementById('status').style.color = "#ff9933";
            }
        }
        setInterval(syncData, 1500);
    </script>
</body>
</html>
