<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NeuroVibe AI Technologies Pvt Ltd</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        :root { --blue: #4facfe; --orange: #ff9933; --bg: #0d1117; --card: #161b22; }
        body { margin:0; font-family: sans-serif; background:var(--bg); color:white; padding:12px; }
        .header { display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid var(--orange); padding-bottom:10px; margin-bottom:15px; }
        .grid { display:grid; grid-template-columns:repeat(3, 1fr); gap:8px; margin-bottom:15px; }
        .box { background:var(--card); border:1px solid #334155; padding:15px; border-radius:10px; text-align:center; }
        .val { font-size:22px; font-weight:bold; color:var(--blue); }
        .unit { font-size:10px; color:var(--orange); display:block; margin-top:2px; }
        .graph { background:var(--card); padding:15px; border-radius:12px; height:180px; border:1px solid #334155; margin-bottom:15px; }
        /* Admin Section */
        .admin { background:var(--card); border:1px solid var(--orange); padding:15px; border-radius:12px; }
        .admin-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
        .admin-box { border:1px dashed #4facfe; padding:10px; border-radius:8px; }
        button { background:var(--blue); color:white; border:none; padding:8px; border-radius:5px; cursor:pointer; width:100%; margin-top:5px; font-weight:bold; }
        select, input { background:#0d1117; border:1px solid #334155; color:white; padding:8px; width:100%; border-radius:5px; margin-top:5px; font-size:11px; }
    </style>
</head>
<body>

    <div class="header">
        <div><b style="color:var(--blue); font-size:14px;">NEUROVIBE AI</b><br><small style="color:var(--orange); font-size:8px; font-weight:bold;">Technologies Pvt Ltd</small></div>
        <div id="st" style="color:#ff9933; font-size:9px;">● CONNECTING...</div>
    </div>

    <div class="grid">
        <div class="box"><h3>Velocity</h3><div class="val" id="v">0.0</div><span class="unit">MM/S</span></div>
        <div class="box"><h3>Acceleration</h3><div class="val" id="a">0.0</div><span class="unit">G</span></div>
        <div class="box"><h3>Temperature</h3><div class="val" id="t">0.0</div><span class="unit">°C</span></div>
        <div class="box"><h3>Mag. Flux</h3><div class="val" id="f">0.0</div><span class="unit">T</span></div>
        <div class="box"><h3>Max RPM</h3><div class="val" id="r">0</div><span class="unit">RPM</span></div>
        <div class="box"><h3>Ultrasound</h3><div class="val" id="u">0.0</div><span class="unit">DB</span></div>
    </div>

    <div class="graph"><canvas id="chart"></canvas></div>

    <!-- ADMIN SECTION (PDF LOGIC) -->
    <div class="admin">
        <h3 style="color:var(--orange); font-size:12px; margin-top:0;">ADMIN: INVENTORY & PROVISIONING</h3>
        <div class="admin-grid">
            <!-- Separate Gateway/Node Columns -->
            <div class="admin-box">
                <p style="font-size:9px; color:#4facfe;">INVENTORY IMPORT (GATEWAY / NODE)</p>
                <select id="type"><option>FOR GATEWAY COLUMN</option><option>FOR NODE COLUMN</option></select>
                <input type="file" id="file">
                <div style="display:flex; gap:5px;">
                    <button onclick="alert('Importing...')">IMPORT</button>
                    <button onclick="window.location.href='/api/export'" style="background:var(--orange);">EXPORT ALL</button>
                </div>
            </div>
            <!-- Discovery Mode for unknown MAC ID -->
            <div class="admin-box">
                <p style="font-size:9px; color:var(--orange);">PROVISIONING (ASK TOKEN)</p>
                <select id="discovery"><option value="">-- MAC Nahi Pata? Discover --</option><option>NV-GW-99-A1 (New)</option></select>
                <input type="text" placeholder="OR Enter MAC ID Manually">
                <button onclick="alert('Token: NV-7821')">ASK TOKEN</button>
            </div>
        </div>
    </div>

    <script>
        let chart; const ctx = document.getElementById('chart').getContext('2d');
        function init() { chart = new Chart(ctx, { type: 'line', data: { labels: Array(25).fill(''), datasets: [{ data: Array(25).fill(0), borderColor: '#4facfe', borderWidth: 2, fill: false, pointRadius: 0 }] }, options: { responsive:true, maintainAspectRatio:false, scales: { x:{display:false}, y:{grid:{color:'#334155'}} }, plugins:{legend:{display:false}} } }); }
        async function sync() {
            try {
                const res = await fetch('/api/status');
                const d = await res.json();
                document.getElementById('v').innerText = d.metrics.velocity;
                document.getElementById('a').innerText = d.metrics.acceleration;
                document.getElementById('t').innerText = d.metrics.temp;
                document.getElementById('f').innerText = d.metrics.flux;
                document.getElementById('r').innerText = d.metrics.rpm;
                document.getElementById('u').innerText = d.metrics.ultrasound;
                chart.data.datasets[0].data.shift(); chart.data.datasets[0].data.push(d.metrics.velocity); chart.update('none');
                document.getElementById('st').innerText = "● ONLINE"; document.getElementById('st').style.color = "#00ff00";
            } catch (e) { document.getElementById('st').innerText = "● CONNECTING..."; }
        }
        window.onload = () => { init(); setInterval(sync, 1500); };
    </script>
</body>
</html>
