<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroVibe AI Technologies Pvt Ltd | System</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root { --blue: #4facfe; --orange: #ff9933; --bg: #0d1117; --card: #161b22; }
        body { margin:0; font-family:'Roboto', sans-serif; background:var(--bg); color:white; padding:12px; }
        .header { display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid var(--orange); padding-bottom:10px; margin-bottom:15px; }
        .logo-box { background:white; padding:4px; border-radius:6px; height:35px; width:35px; display:flex; align-items:center; justify-content:center; }
        .brand b { font-family:'Orbitron'; color:var(--blue); font-size:14px; letter-spacing:1px; }
        .brand small { color:var(--orange); font-size:8px; display:block; font-weight:bold; text-transform:uppercase; }
        .grid { display:grid; grid-template-columns:repeat(3, 1fr); gap:8px; margin-bottom:15px; }
        .box { background:var(--card); border:1px solid #334155; padding:15px 5px; border-radius:10px; text-align:center; }
        .val { font-size:20px; font-weight:bold; color:var(--blue); }
        .unit { font-size:8px; color:var(--orange); display:block; font-weight:bold; }
        .graph-area { background:var(--card); border:1px solid #334155; padding:15px; border-radius:12px; height:200px; margin-bottom:20px; }
        #chartTitle { color:var(--blue); font-size:10px; font-family:'Orbitron'; margin-bottom:10px; }
        /* Admin Panel Styles */
        .admin-panel { background:var(--card); border:1px solid var(--orange); padding:15px; border-radius:12px; }
        .admin-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
        .admin-box { border:1px dashed #4facfe; padding:10px; border-radius:8px; }
        button { background:var(--blue); color:white; border:none; padding:8px; border-radius:5px; cursor:pointer; width:100%; margin-top:5px; font-weight:bold; }
    </style>
</head>
<body>

    <div class="header">
        <div style="display:flex; align-items:center; gap:10px;">
            <div class="logo-box">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org"><circle cx="50" cy="50" r="45" fill="#4facfe""")/>><path d="M30 70 L50 30 L70 70 Z" fill="white""")/>><circle cx="50" cy="55" r="10" fill="#ff9933""")/>></svg>
            </div>
            <div class="brand"><b>NEUROVIBE AI</b><small>Technologies Pvt Ltd</small></div>
        </div>
        <div id="st" style="color:#ff9933; font-size:9px; font-weight:bold;">● CONNECTING...</div>
    </div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:15px;">
        <select id="site" style="background:var(--card); color:white; border:1px solid var(--blue); padding:10px; border-radius:8px;"><option value="s1">Ammonia Pump (Main)</option></select>
        <select id="mode" style="background:var(--card); color:white; border:1px solid var(--blue); padding:10px; border-radius:8px;"><option value="trend">OVERALL TREND</option><option value="fft">SPECTRUM (FFT)</option></select>
    </div>

    <div class="grid">
        <div class="box"><div style="font-size:9px; color:gray;">Velocity</div><div id="v" class="val">0.0</div><span class="unit">MM/S</span></div>
        <div class="box"><div style="font-size:9px; color:gray;">Acceleration</div><div id="a" class="val">0.0</div><span class="unit">G</span></div>
        <div class="box"><div style="font-size:9px; color:gray;">Temperature</div><div id="t" class="val">0.0</div><span class="unit">°C</span></div>
        <div class="box"><div style="font-size:9px; color:gray;">Mag. Flux</div><div id="f" class="val">0.0</div><span class="unit">T</span></div>
        <div class="box"><div style="font-size:9px; color:gray;">RPM</div><div id="r" class="val">0</div><span class="unit">RPM</span></div>
        <div class="box"><div style="font-size:9px; color:gray;">Ultrasound</div><div id="u" class="val">0.0</div><span class="unit">DB</span></div>
    </div>

    <div class="graph-area">
        <div id="chartTitle">LIVE VIBRATION TREND</div>
        <canvas id="liveChart"></canvas>
    </div>

    <!-- INVENTORY & PROVISIONING PANEL (As per PDF Page 1 & 3) -->
    <div class="admin-panel">
        <h3 style="color:var(--orange); font-size:12px; margin-top:0;">ADMIN: INVENTORY & PROVISIONING</h3>
        <div class="admin-grid">
            <div class="admin-box">
                <p style="font-size:9px; color:#4facfe; margin:0;">INVENTORY IMPORT (EXCEL)</p>
                <input type="file" id="excelFile" style="font-size:9px; margin-top:5px;">
                <button onclick="alert('Excel logic enabled!')">IMPORT</button>
            </div>
            <div class="admin-box">
                <p style="font-size:9px; color:var(--orange); margin:0;">PROVISIONING TOKEN</p>
                <input type="text" id="mac" placeholder="Enter MAC ID" style="background:#0d1117; color:white; border:1px solid #334155; padding:5px; width:70%; font-size:9px; border-radius:4px;">
                <button onclick="getToken()">ASK TOKEN</button>
            </div>
        </div>
        <div id="tokenResult" style="color:#00ff00; font-size:12px; font-weight:bold; margin-top:10px; text-align:center;"></div>
    </div>

    <script>
        let chart; const ctx = document.getElementById('liveChart').getContext('2d');
        function init() { chart = new Chart(ctx, { type: 'line', data: { labels: Array(25).fill(''), datasets: [{ data: Array(25).fill(0), borderColor: '#4facfe', backgroundColor: 'rgba(79, 172, 254, 0.1)', borderWidth: 2, fill: true, tension: 0.4, pointRadius: 0 }] }, options: { responsive:true, maintainAspectRatio:false, scales: { x:{display:false}, y:{grid:{color:'#334155'}, ticks:{color:'#8b949e', font:{size:8}}} }, plugins:{legend:{display:false}} } }); }
        
        async function sync() {
            try {
                const res = await fetch('/api/status');
                const d = await res.json();
                const m = d.metrics;
                const mode = document.getElementById('mode').value;
                document.getElementById('v').innerText = m.velocity; document.getElementById('a').innerText = m.acceleration;
                document.getElementById('t').innerText = m.temp; document.getElementById('f').innerText = m.flux;
                document.getElementById('r').innerText = m.rpm; document.getElementById('u').innerText = m.ultrasound;
                if (mode === "fft") {
                    document.getElementById('chartTitle').innerText = "VIBRATION SPECTRUM (FFT)";
                    chart.data.datasets[0].data = d.spectrum;
                } else {
                    document.getElementById('chartTitle').innerText = "LIVE VIBRATION TREND";
                    chart.data.datasets[0].data.shift(); chart.data.datasets[0].data.push(m.velocity);
                }
                chart.update('none'); document.getElementById('st').innerText = "● ONLINE"; document.getElementById('st').style.color = "#00ff00";
            } catch (e) { document.getElementById('st').innerText = "● CONNECTING..."; }
        }

        async function getToken() {
            const res = await fetch('/api/generate-token', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({mac: document.getElementById('mac').value}) });
            const data = await res.json();
            document.getElementById('tokenResult').innerText = "TOKEN: " + data.token;
        }
        window.onload = () => { init(); setInterval(sync, 1500); };
    </script>
</body>
</html>
