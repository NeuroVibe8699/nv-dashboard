<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | NeuroVibe AI Technologies</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        :root {
            --neuro-blue: #4facfe;
            --neuro-orange: #ff9933;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-dark);
            color: white;
        }

        /* Professional Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            padding: 15px 25px;
            border-radius: 15px;
            border-bottom: 3px solid var(--neuro-orange);
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-img {
            height: 50px;
            background: white;
            padding: 5px;
            border-radius: 8px;
        }

        .brand-text h1 {
            margin: 0;
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            color: var(--neuro-blue);
            letter-spacing: 1px;
        }

        .brand-text p {
            margin: 0;
            font-size: 10px;
            color: var(--neuro-orange);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .status-badge {
            background: rgba(0, 255, 0, 0.1);
            color: #00ff00;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            border: 1px solid #00ff00;
        }

        /* Metrics Grid */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .metric-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border-left: 4px solid var(--neuro-blue);
            transition: 0.3s;
        }

        .metric-card:hover { transform: translateY(-5px); }

        .metric-card h3 {
            margin: 0;
            font-size: 14px;
            color: #94a3b8;
            text-transform: uppercase;
        }

        .metric-value {
            font-size: 28px;
            font-weight: bold;
            margin: 10px 0;
            color: white;
        }

        .unit { font-size: 14px; color: var(--neuro-orange); }

        /* Chart Section */
        .chart-box {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid #334155;
        }

        canvas { width: 100% !important; height: 350px !important; }
    </style>
</head>
<body>

    <!-- Header Section -->
    <div class="header">
        <div class="logo-section">
            <img src="logo.jpg" alt="Logo" class="logo-img">
            <div class="brand-text">
                <h1>NEUROVIBE AI</h1>
                <p>Technologies Pvt Ltd</p>
            </div>
        </div>
        <div class="status-badge">● SYSTEM ONLINE</div>
    </div>

    <!-- Main Metrics -->
    <div class="metrics-grid">
        <div class="metric-card">
            <h3>Vibration Velocity</h3>
            <div class="metric-value" id="val-vel">4.2 <span class="unit">mm/s</span></div>
        </div>
        <div class="metric-card">
            <h3>RPM</h3>
            <div class="metric-value" id="val-rpm">1450 <span class="unit">RPM</span></div>
        </div>
        <div class="metric-card">
            <h3>Temperature</h3>
            <div class="metric-value" id="val-temp">38.4 <span class="unit">°C</span></div>
        </div>
        <div class="metric-card">
            <h3>Magnetic Flux</h3>
            <div class="metric-value" id="val-flux">0.12 <span class="unit">T</span></div>
        </div>
    </div>

    <!-- Live Chart -->
    <div class="chart-box">
        <h3 style="margin-top:0; color:var(--neuro-blue); font-family:'Orbitron'">Live Vibration Spectrum (FFT)</h3>
        <canvas id="vibrationChart"></canvas>
    </div>

    <script>
        // Chart Configuration
        const ctx = document.getElementById('vibrationChart').getContext('2d');
        const vibrationChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array.from({length: 50}, (_, i) => i),
                datasets: [{
                    label: 'Frequency (Hz)',
                    data: Array.from({length: 50}, () => Math.random() * 2),
                    borderColor: '#4facfe',
                    backgroundColor: 'rgba(79, 172, 254, 0.2)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: { grid: { color: '#334155' }, ticks: { color: '#94a3b8' } },
                    x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
                },
                plugins: { legend: { display: false } }
            }
        });

        // Live Data Update Logic
        async function updateDashboard() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                
                if (data.status === "Online") {
                    document.getElementById('val-vel').innerHTML = `${data.metrics.velocity} <span class="unit">mm/s</span>`;
                    document.getElementById('val-rpm').innerHTML = `${data.metrics.rpm} <span class="unit">RPM</span>`;
                    document.getElementById('val-temp').innerHTML = `${data.metrics.temp} <span class="unit">°C</span>`;
                    
                    // Update Chart with random spikes for "Live" feel
                    vibrationChart.data.datasets[0].data.shift();
                    vibrationChart.data.datasets[0].data.push(Math.random() * 3);
                    vibrationChart.update('none');
                }
            } catch (err) {
                console.error("Fetch error:", err);
            }
        }

        setInterval(updateDashboard, 2000);
    </script>
</body>
</html>
