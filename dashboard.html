<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroVibe | AI Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net"></script>
    <link href="https://cdnjs.cloudflare.com" rel="stylesheet">
    <style>
        :root { --saffron: #FF9933; --deep: #0f172a; }
        body { background: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass-3d { background: white; border-radius: 2rem; border: 1px solid #e2e8f0; box-shadow: 15px 15px 40px #d1d9e6, -15px -15px 40px #ffffff; }
    </style>
</head>
<body class="p-6 md:p-12">

    <!-- PDF Page 3 Logic: Live Monitoring -->
    <header class="flex justify-between items-center mb-12">
        <div>
            <h1 class="text-2xl font-black italic tracking-tighter uppercase text-slate-900">NeuroVibe <span class="text-orange-500">AI</span></h1>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[4px] mt-1">Autonomous Machine Intelligence</p>
        </div>
        <div class="glass-3d px-8 py-3 flex items-center space-x-4 border-l-4 border-l-orange-500">
            <span class="text-xs font-black text-slate-900">ASSET: <span class="text-orange-500">Main Ammonia Pump</span></span>
        </div>
    </header>

    <div class="grid lg:grid-cols-4 gap-8">
        <!-- Live Risk Indicators -->
        <div class="lg:col-span-1 space-y-6">
            <div class="glass-3d p-6 border-l-8 border-l-red-500">
                <p class="text-[10px] font-bold text-slate-400 uppercase mb-2">Failure Risk</p>
                <h4 class="text-2xl font-black text-red-500">CRITICAL</h4>
                <p class="text-[10px] text-slate-500 mt-2 font-medium">Early bearing fault suspected. High frequency vibration detected.</p>
            </div>
            <div class="glass-3d p-6">
                <p class="text-[10px] font-bold text-slate-400 uppercase mb-4">Risk Distribution</p>
                <div class="space-y-4">
                    <div><p class="text-[10px] font-bold mb-1">Harmonics</p><div class="w-full bg-slate-100 h-1 rounded-full overflow-hidden"><div class="bg-orange-500 h-full w-[80%]"></div></div></div>
                    <div><p class="text-[10px] font-bold mb-1">Vibrations</p><div class="w-full bg-slate-100 h-1 rounded-full overflow-hidden"><div class="bg-teal-500 h-full w-[40%]"></div></div></div>
                </div>
            </div>
        </div>

        <!-- Main Graph (P2/P3 Mix) -->
        <div class="lg:col-span-3 glass-3d p-10">
            <div class="flex justify-between items-center mb-10">
                <h3 class="font-black text-xs uppercase tracking-widest text-slate-400 italic">Spectrum & Flux Real-time (μT/g)</h3>
                <div class="flex space-x-4">
                    <span class="text-[10px] font-bold bg-slate-900 text-white px-4 py-1.5 rounded-full">NODE: NV-PF4</span>
                </div>
            </div>
            <canvas id="mainChart" height="120"></canvas>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('mainChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['10am','11am','12pm','1pm','2pm','3pm'],
                datasets: [{
                    label: 'Anomaly Trend',
                    data: [1.2, 1.8, 1.4, 2.2, 1.9, 1.5],
                    borderColor: '#FF9933',
                    borderWidth: 6,
                    tension: 0.4,
                    fill: true,
                    backgroundColor: 'rgba(255, 153, 51, 0.05)',
                    pointRadius: 0
                }]
            },
            options: { plugins: { legend: { display: false } }, scales: { y: { border: { display: false } }, x: { grid: { display: false } } } }
        });
    </script>
</body>
</html>
