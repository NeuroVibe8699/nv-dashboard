<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NeuroVibe AI Technologies | Dashboard</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        :root { --blue: #4facfe; --orange: #ff9933; --bg: #0d1117; --card: #161b22; }
        body { margin:0; font-family:sans-serif; background:var(--bg); color:white; padding:12px; }
        .header { display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid var(--orange); padding-bottom:10px; margin-bottom:20px; }
        .brand { line-height:1.2; }
        .brand b { color:var(--blue); font-size:16px; letter-spacing:1px; }
        .brand small { color:var(--orange); font-size:9px; display:block; font-weight:bold; }
        .grid { display:grid; grid-template-columns:repeat(3, 1fr); gap:8px; margin-bottom:15px; }
        .box { background:var(--card); border:1px solid #30363d; padding:15px 5px; border-radius:8px; text-align:center; }
        .val { font-size:22px; font-weight:bold; color:var(--blue); }
        .chart-area { background:var(--card); border:1px solid #30363d; padding:15px; border-radius:10px; height:220px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="brand">
            <b>NEUROVIBE AI</b>
            <small>Technologies Pvt Ltd</small>
        </div>
        <div id="status" style="color:#00ff00; font-size:10px;">● ONLINE</div>
    </div>

    <!-- PDF Logic: Selection Controls -->
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:15px;">
        <select id="site" style="background:#161b22; color:white; border:1px solid var(--blue); padding:10px; border-radius:6px;">
            <option value="">Select Site</option>
            <option value="p1">Ammonia Pump (Main)</option>
        </select>
        <select style="background:#161b22; color:white; border:1px solid var(--blue); padding:10px; border-radius:6px;">
            <option>MODE: OVERALL TREND</option>
        </select>
    </div>

    <div class="grid">
        <div class="box"><div style="font-size:9px; color:gray;">Velocity</div><div id="v" class="val">0.0</div><div style="color:var(--orange); font-size:9px;">MM/S</div></div>
        <div class="box"><div style="font-size:9px; color:gray;">Acceleration</div><div id="a" class="val">0.0</div><div style="color:var(--orange); font-size:9px;">G</div></div>
        <div class="box"><div style="font-size:9px; color:gray;">Temperature</div><div id="t" class="val">0.0</div><div style="color:var(--orange); font-size:9px;">°C</div></div>
        <div class="box"><div style="font-size:9px; color:gray;">Mag. Flux</div><div id="f" class="val">0.0</div><div style="color:var(--orange); font-size:9px;">T</div></div>
        <div class="box"><div style="font-size:9px; color:gray;">Max RPM</div><div id="r" class="val">0</div><div style="color:var(--orange); font-size:9px;">RPM</div></div>
        <div class="box"><div style="font-size:9px; color:gray;">Ultrasound</div><div id="u" class="val">0.0</div><div style="color:var(--orange); font-size:9px;">DB</div></div>
    </div>

    <div class="chart-area">
        <canvas id="liveChart"></canvas>
    </div>

    <script>
        let chart;
        const ctx = document.getElementById('liveChart').getContext('2d');
        chart = new Chart(ctx, { type: 'line', data: { labels: Array(20).fill(''), datasets: [{ data: Array(20).fill(0), borderColor: '#ff9933', borderWidth: 2, fill: false, pointRadius: 0, tension: 0.4 }] }, options: { responsive:true, maintainAspectRatio:false, scales: { x:{display:false}, y:{grid:{color:'#30363d'}} }, plugins:{legend:{display:false}} } });

        async function update() {
            if(!document.getElementById('site').value) return;
            try {
                const res = await fetch('/api/status');
                const d = await res.json();
                const m = d.metrics;
                
                document.getElementById('v').innerText = m.velocity;
                document.getElementById('a').innerText = m.acceleration;
                document.getElementById('t').innerText = m.temp;
                document.getElementById('f').innerText = m.flux;
                document.getElementById('r').innerText = m.rpm;
                document.getElementById('u').innerText = m.ultrasound;

                chart.data.datasets[0].data.shift();
                chart.data.datasets[0].data.push(m.velocity);
                chart.update('none');
            } catch(e) { console.log("Sync..."); }
        }
        setInterval(update, 1500);
    </script>
</body>
</html>
