<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroVibe AI Dashboard</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        body { background-color: #0d1117; color: white; font-family: sans-serif; margin: 0; padding: 10px; }
        .header { display: flex; justify-content: space-between; border-bottom: 1px solid #30363d; padding: 5px; }
        .logo { color: #FF9933; font-weight: bold; font-size: 14px; letter-spacing: 1px; }
        .status { background: #008000; color: white; padding: 2px 10px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        
        .controls { display: flex; gap: 10px; margin: 15px 0; }
        select { background: #161b22; color: white; border: 1px solid #30363d; padding: 8px; width: 100%; border-radius: 5px; font-size: 12px; }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .card { background: #161b22; border: 1px solid #30363d; padding: 20px; border-radius: 6px; text-align: center; }
        .label { color: #8b949e; font-size: 10px; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px; }
        .value { font-size: 26px; font-weight: bold; color: #58a6ff; margin-bottom: 5px; }
        .unit { color: #FF9933; font-size: 10px; font-weight: bold; }

        .graph-area { background: #161b22; border: 1px solid #30363d; margin-top: 15px; padding: 15px; border-radius: 6px; height: 180px; }
        .graph-title { color: #58a6ff; font-size: 11px; margin-bottom: 10px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">NEUROVIBE AI <br><span style="font-size: 8px; color: #8b949e;">PREDICTIVE MAINTENANCE 8699</span></div>
        <div class="status">● ONLINE</div>
    </div>

    <div class="controls">
        <select><option>Ammonia Pump (Main)</option></select>
        <select><option>MODE: SPECTRUM (FFT)</option></select>
    </div>

    <div class="grid">
        <div class="card"><div class="label">Velocity</div><div class="value" id="v">0.0</div><div class="unit">MM/S</div></div>
        <div class="card"><div class="label">Acceleration</div><div class="value" id="a">0.0</div><div class="unit">G</div></div>
        <div class="card"><div class="label">Temperature</div><div class="value" id="t">0.0</div><div class="unit">°C</div></div>
        <div class="card"><div class="label">Max RPM</div><div class="value" id="r">0</div><div class="unit">RPM</div></div>
        <div class="card"><div class="label">Flux</div><div class="value" id="f">0</div><div class="unit">WB</div></div>
        <div class="card"><div class="label">Ultrasound</div><div class="value" id="u">0.0</div><div class="unit">DB</div></div>
    </div>

    <div class="graph-area">
        <div class="graph-title">LIVE VIBRATION TREND</div>
        <canvas id="liveChart" style="width: 100%; height: 120px;"></canvas>
    </div>

    <script>
        const ctx = document.getElementById('liveChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ data: [], borderColor: '#FF9933', borderWidth: 2, pointRadius: 0, fill: false, tension: 0.4 }] },
            options: { scales: { x: { display: false }, y: { grid: { color: '#30363d' } } }, plugins: { legend: { display: false } } }
        });

        async function updateData() {
            try {
                const res = await fetch('/api/status');
                const json = await res.json();
                const m = json.metrics;

                // Purane IDs (v, a, t, r, f, u) se match karte huye update
                document.getElementById('v').innerText = m.velocity;
                document.getElementById('a').innerText = m.acceleration;
                document.getElementById('t').innerText = m.temp;
                document.getElementById('r').innerText = m.rpm;
                document.getElementById('f').innerText = m.flux;
                document.getElementById('u').innerText = m.ultrasound;

                // Live Graph update
                if (chart.data.labels.length > 20) { chart.data.labels.shift(); chart.data.datasets[0].data.shift(); }
                chart.data.labels.push("");
                chart.data.datasets[0].data.push(m.acceleration);
                chart.update('none');
            } catch (e) { console.log("Connecting..."); }
        }
        setInterval(updateData, 2000);
    </script>
</body>
</html>
