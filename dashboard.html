<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroVibe AI Technologies Pvt Ltd | Dashboard</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        :root { --blue: #4facfe; --orange: #ff9933; --bg: #0d1117; --card: #161b22; --border: #334155; }
        body { margin:0; font-family: sans-serif; background:var(--bg); color:white; padding:12px; }
        .header { display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid var(--orange); padding-bottom:8px; margin-bottom:15px; }
        .logo-box { background:white; padding:4px; border-radius:6px; height:32px; width:32px; display:flex; align-items:center; justify-content:center; }
        .brand b { color:var(--blue); font-size:14px; letter-spacing:1px; }
        .brand small { color:var(--orange); font-size:8px; display:block; font-weight:bold; }
        .grid { display:grid; grid-template-columns:repeat(3, 1fr); gap:8px; margin-bottom:15px; }
        .box { background:var(--card); border:1px solid #334155; padding:15px; border-radius:10px; text-align:center; }
        .val { font-size:18px; font-weight:bold; color:var(--blue); }
        .unit { font-size:8px; color:var(--orange); display:block; font-weight:bold; }
        
        /* Admin Card Fix */
        .admin-card { background:var(--card); border:1px solid var(--orange); padding:15px; border-radius:12px; margin-top:10px; }
        .admin-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
        .admin-box { border:1px dashed #4facfe; padding:10px; border-radius:8px; }
        button { background:var(--blue); color:white; border:none; padding:8px; border-radius:5px; cursor:pointer; width:100%; font-weight:bold; font-size:10px; margin-top:5px; }
        select, input { background:#0d1117; border:1px solid #334155; color:white; padding:8px; width:100%; border-radius:6px; margin-top:5px; font-size:10px; }
    </style>
</head>
<body>
    <div class="header">
        <div style="display:flex; align-items:center; gap:10px;">
            <div class="logo-box">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org"><circle cx="50" cy="50" r="45" fill="#4facfe""")/>><path d="M30 70 L50 30 L70 70 Z" fill="white""")/>><circle cx="50" cy="55" r="10" fill="#ff9933""")/>></svg>
            </div>
            <div class="brand"><b>NEUROVIBE AI</b><br><small>Technologies Pvt Ltd</small></div>
        </div>
        <div id="st" style="color:#00ff00; font-size:10px;">● ONLINE</div>
    </div>

    <div class="grid">
        <div class="box"><h3>Velocity</h3><div class="val" id="v">4.28</div><span class="unit">MM/S</span></div>
        <div class="box"><h3>Acceleration</h3><div class="val" id="a">0.82</div><span class="unit">G</span></div>
        <div class="box"><h3>Temp</h3><div class="val" id="t">38.9</div><span class="unit">°C</span></div>
        <div class="box"><h3>Flux</h3><div class="val" id="f">0.103</div><span class="unit">T</span></div>
        <div class="box"><h3>RPM</h3><div class="val" id="r">1444</div><span class="unit">RPM</span></div>
        <div class="box"><h3>Ultrasound</h3><div class="val" id="u">26.3</div><span class="unit">DB</span></div>
    </div>

    <div class="admin-card">
        <h4 style="color:var(--orange); font-size:10px; margin:0 0 10px 0;">ADMIN: INVENTORY & PROVISIONING (PDF LOGIC)</h4>
        <div class="admin-grid">
            <div class="admin-box">
                <p style="font-size:9px; color:#4facfe; margin:0;">1. INVENTORY (GATEWAY / NODE)</p>
                <select id="type"><option>FOR GATEWAY COLUMN</option><option>FOR NODE COLUMN</option></select>
                <input type="file" style="padding:2px;">
                <div style="display:flex; gap:5px;">
                    <button onclick="alert('Importing...')">IMPORT</button>
                    <button style="background:var(--orange);" onclick="window.location.href='/api/export'">EXPORT REPORT</button>
                </div>
            </div>
            <div class="admin-box">
                <p style="font-size:9px; color:var(--orange); margin:0;">2. PROVISIONING (DYNAMIC TOKEN)</p>
                <select id="discovery"><option value="">Discovery Mode (MAC Unknown)</option><option>NV-GW-MAC-F1</option></select>
                <input type="text" placeholder="OR Enter MAC ID Manually">
                <button onclick="askToken()">ASK TOKEN NO</button>
                <div id="tk" style="text-align:center; color:#00ff00; font-weight:bold; margin-top:8px;"></div>
            </div>
        </div>
    </div>

    <script>
        async function sync() {
            try {
                const res = await fetch('/api/status');
                const d = await res.json();
                document.getElementById('v').innerText = d.metrics.velocity;
                document.getElementById('a').innerText = d.metrics.acceleration;
                document.getElementById('t').innerText = d.metrics.temp;
                document.getElementById('f').innerText = d.metrics.flux;
                document.getElementById('r').innerText = d.metrics.rpm;
                document.getElementById('u').innerText = d.metrics.ultrasound;
            } catch (e) { console.log("Sync..."); }
        }
        async function askToken() {
            try {
                const res = await fetch('/api/get-token');
                const d = await res.json();
                document.getElementById('tk').innerText = "TOKEN: " + d.token;
            } catch (e) { document.getElementById('tk').innerText = "TOKEN: NV-" + Math.floor(Math.random()*900000+100000); }
        }
        setInterval(sync, 1500);
    </script>
</body>
</html>
