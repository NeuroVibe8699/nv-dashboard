<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>NeuroVibe | Client Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background: #0F1115; color: white; }</style>
</head>
<body class="p-10">
    <div class="flex justify-between items-center mb-10 border-b border-gray-800 pb-6">
        <h1 class="text-2xl font-black">NEURO<span class="text-orange-500">VIBE</span> <span class="text-xs text-gray-500 ml-2 uppercase">Unit Analytics</span></h1>
        <button onclick="location.href='index.html'" class="text-gray-500 font-bold uppercase text-xs">Sign Out</button>
    </div>
    <!-- Analytics -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div class="lg:col-span-2 bg-gray-900 p-8 rounded-2xl border border-gray-800">
            <h3 class="text-orange-500 font-bold mb-6 uppercase tracking-widest">Ammonia Pump Velocity (mm/s)</h3>
            <div class="h-64 flex items-end space-x-2 border-b border-gray-800 pb-2">
                <div class="bg-orange-500 w-full h-[40%] opacity-40"></div>
                <div class="bg-orange-500 w-full h-[65%]"></div>
                <div class="bg-orange-500 w-full h-[95%]"></div>
                <div class="bg-orange-500 w-full h-[30%] opacity-30"></div>
            </div>
        </div>
        <div class="bg-gray-900 p-8 rounded-2xl border border-gray-800 flex flex-col justify-between">
            <div>
                <h4 class="font-bold mb-4 uppercase text-xs">Active Asset Details</h4>
                <p class="text-xs text-gray-500">Model: NV-S1001 (Neuro-Acoustic Node)</p>
                <p class="text-xs text-gray-500">Health: <span class="text-green-500 font-bold">STABLE (94.2%)</span></p>
            </div>
            <button class="bg-gray-800 p-3 rounded-lg text-[10px] uppercase font-black">Download Log Report</button>
        </div>
    </div>
</body>
</html>
