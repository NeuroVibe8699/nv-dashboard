<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroVibe AI Technologies Pvt Ltd | Dashboard</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root { --blue: #4facfe; --orange: #ff9933; --bg: #0d1117; --card: #161b22; --border: #334155; }
        body { margin:0; font-family:'Roboto', sans-serif; background:var(--bg); color:white; padding:12px; overflow-x:hidden; }
        
        /* Header Fix: Pure Brand Name */
        .header { display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid var(--orange); padding-bottom:10px; margin-bottom:15px; }
        .logo-section { display:flex; align-items:center; gap:10px; }
        .logo-box { background:white; padding:4px; border-radius:6px; height:32px; width:32px; display:flex; align-items:center; justify-content:center; }
        .brand b { font-family:'Orbitron'; color:var(--blue); font-size:14px; letter-spacing:1px; }
        .brand small { color:var(--orange); font-size:8px; display:block; font-weight:bold; text-transform:uppercase; }
        #st { font-size:10px; font-weight:bold; color:var(--orange); padding:4px 8px; border-radius:15px; border:1px solid var(--orange); }

        /* Site Selection Controls */
        .controls { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:15px; }
        select { background:var(--card); color:white; border:1px solid var(--blue); padding:10px; border-radius:8px; font-size:12px; outline:none; }

        /* 3x2 Metrics Grid */
        .grid { display:grid; grid-template-columns:repeat(3, 1fr); gap:8px; margin-bottom:15px; }
        .box { background:var(--card); border:1px solid var(--border); padding:15px 5px; border-radius:10px; text-align:center; }
        .box h3 { margin:0; font-size:9px; color:#94a3b8; text-transform:uppercase; letter-spacing:0.5px; }
        .val { font-size:20px; font-weight:bold; color:var(--blue); margin:5px 0; }
        .unit { font-size:8px; color:var(--orange); font-weight:bold; display:block; }

        /* Graphics Area */
        .graph-area { background:var(--card); border:1px solid var(--border); padding:15px; border-radius:12px; height:200px; margin-bottom:15px; }
        #chartTitle { color:var(--blue); font-size:10px; font-family:'Orbitron'; margin-bottom:8px; text-transform:uppercase; }

        /* Admin/Inventory Panel (As per PDF Page 1 & 3) */
        .admin-card { background:var(--card); border:1px solid var(--orange); padding:15px; border-radius:12px; }
        .admin-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
        .admin-box { border:1px dashed #4facfe; padding:10px; border-radius:8px; }
        .admin-box p { font-size:9px; color:#4facfe; margin:0 0 8px 0; font-weight:bold; }
        button { background:var(--blue); color:white; border:none; padding:10px; border-radius:6px; cursor:pointer; width:100%; font-weight:bold; font-size:11px; margin-top:8px; }
        .btn-orange { background:var(--orange); }
        input { background:#0d1117; border:1px solid var(--border); color:white; padding:8px; width:100%; border-radius:6px; box-sizing:border-box; font-size:10px; margin-top:5px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-section">
            <div class="logo-box">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org">
                    <circle cx="50" cy="50" r="45" fill="#4facfe" />
                    <path d="M30 70 L50 30 L70 70 Z" fill="white" />
                    <circle cx="50" cy="55" r="10" fill="#ff9933" />
                </svg>
            </div>
            <div class="brand"><b>NEUROVIBE AI</b><small>Technologies Pvt Ltd</small></div>
        </div>
        <div id="st">● CONNECTING...</div>
    </div>

    <div class="controls">
        <select id="siteSelect"><option value="">Select Site (e.g. Ammonia Pump)</option><option value="s1">Ammonia Pump (Main)</option></select>
        <select id="modeSelect"><option value="trend">OVERALL TREND</option><option value="fft">SPECTRUM (FFT)</option></select>
    </div>

    <div class="grid">
        <div class="box"><h3>Velocity</h3><div class="val" id="v">0.0</div><span class="unit">MM/S</span></div>
        <div class="box"><h3>Acceleration</h3><div class="val" id="a">0.0</div><span class="unit">G</span></div>
        <div class="box"><h3>Temperature</h3><div class="val" id="t">0.0</div><span class="unit">°C</span></div>
        <div class="box"><h3>Mag. Flux</h3><div class="val" id="f">0.0</div><span class="unit">T</span></div>
        <div class="box"><h3>Max RPM</h3><div class="val" id="r">0</div><span class="unit">RPM</span></div>
        <div class="box"><h3>Ultrasound</h3><div class="val" id="u">0.0</div><span class="unit">DB</span></div>
    </div>

    <div class="graph-area">
        <p id="chartTitle">LIVE VIBRATION TREND</p>
        <canvas id="liveChart"></canvas>
    </div>

    <div class="admin-card">
        <h3 style="color:var(--orange); font-size:11px; margin-top:0; border-bottom:1px solid #334155; padding-bottom:5px;">ADMIN: INVENTORY & PROVISIONING</h3>
        <div class="admin-grid">
            <div class="admin-box">
                <p>1. INVENTORY (GATEWAY / NODE)</p>
                <select id="invType" style="padding:6px; font-size:10px;"><option>GATEWAY COLUMN (IMEI)</option><option>NODE COLUMN (BLE MAC)</option></select>
                <button onclick="window.location.href='/api/export'">EXPORT REPORT (.xlsx)</button>
            </div>
            <div class="admin-box">
                <p>2. PROVISIONING (DYNAMIC TOKEN)</p>
                <input type="text" id="macInput" placeholder="Enter MAC ID OR Discover">
                <button class="btn-orange" onclick="askDynamicToken()">ASK TOKEN NO</button>
            </div>
        </div>
        <div id="tk" style="text-align:center; color:#00ff00; font-weight:bold; margin-top:10px; font-size:14px;"></div>
    </div>

    <script>
        let chart;
        const ctx = document.getElementById('liveChart').getContext('2d');

        function initChart() {
            chart = new Chart(ctx, {
                type: 'line',
                data: { labels: Array(25).fill(''), datasets: [{ data: Array(25).fill(0), borderColor: '#4facfe', backgroundColor: 'rgba(79, 172, 254, 0.1)', borderWidth: 2, fill: true, tension: 0.4, pointRadius: 0 }] },
                options: { responsive:true, maintainAspectRatio:false, scales: { x:{display:false}, y:{grid:{color:'#334155'}, ticks:{color:'#8b949e', font:{size:8}}} }, plugins:{legend:{display:false}} }
            });
        }

        async function sync() {
            try {
                const res = await fetch('/api/status');
                const d = await res.json();
                const m = d.metrics;
                
                document.getElementById('v').innerText = m.velocity;
                document.getElementById('a').innerText = m.acceleration;
                document.getElementById('t').innerText = m.temp;
                document.getElementById('f').innerText = m.flux;
                document.getElementById('r').innerText = m.rpm;
                document.getElementById('u').innerText = m.ultrasound;

                const mode = document.getElementById('modeSelect').value;
                if(mode === "fft") {
                    document.getElementById('chartTitle').innerText = "VIBRATION SPECTRUM (FFT)";
                    chart.data.datasets[0].data = d.spectrum || [1,5,2,8,3,9];
                } else {
                    document.getElementById('chartTitle').innerText = "LIVE VIBRATION TREND";
                    chart.data.datasets[0].data.shift();
                    chart.data.datasets[0].data.push(m.velocity);
                }
                chart.update('none');
                document.getElementById('st').innerText = "● ONLINE";
                document.getElementById('st').style.color = "#00ff00";
                document.getElementById('st').style.borderColor = "#00ff00";
            } catch (e) {
                document.getElementById('st').innerText = "● CONNECTING...";
            }
        }

        async function askDynamicToken() {
            try {
                const res = await fetch('/api/get-token');
                const d = await res.json();
                document.getElementById('tk').innerText = "TOKEN: " + d.token;
            } catch (e) {
                document.getElementById('tk').innerText = "TOKEN: NV-" + Math.floor(100000 + Math.random() * 900000);
            }
        }

        window.onload = () => { initChart(); setInterval(sync, 1500); };
    </script>
</body>
</html>
