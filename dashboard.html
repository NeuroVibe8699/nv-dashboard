<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NeuroVibe Dashboard | NV-8699</title>
    <!-- FIX: Correct Chart.js Library -->
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        :root { --blue: #4facfe; --orange: #ff9933; --bg: #0f172a; --card: #1e293b; }
        body { margin:0; font-family:sans-serif; background:var(--bg); color:white; padding:15px; }
        .header { display:flex; justify-content:space-between; background:var(--card); padding:12px; border-radius:10px; border-bottom:3px solid var(--orange); margin-bottom:15px; }
        .metrics-grid { display:grid; grid-template-columns:repeat(3, 2fr); gap:10px; margin-bottom:15px; }
        .box { background:var(--card); padding:15px; border-radius:10px; text-align:center; border:1px solid #334155; }
        .val { font-size:22px; font-weight:bold; color:var(--blue); margin:5px 0; }
        .unit { font-size:10px; color:var(--orange); font-weight:bold; }
        .chart-container { background:var(--card); padding:20px; border-radius:12px; height:250px; }
        select { background:var(--card); color:white; border:1px solid var(--blue); padding:8px; border-radius:5px; width:48%; }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <b style="color:var(--blue); font-size:18px;">NEUROVIBE AI</b><br>
            <small style="color:var(--orange);">TECHNOLOGIES PVT LTD</small>
        </div>
        <div id="status" style="color:#ff9933; font-weight:bold;">● CONNECTING...</div>
    </div>

    <!-- Dropdowns as per Logic Page 2 -->
    <div style="margin-bottom:15px; display:flex; justify-content:space-between;">
        <select id="siteSelect">
            <option value="">Select Site (e.g. Ammonia Pump)</option>
            <option value="site1">Ammonia Pump</option>
            <option value="site2">Production Area</option>
        </select>
        <select id="modeSelect">
            <option value="overall">OVERALL TREND</option>
            <option value="spectrum">SPECTRUM (FFT)</option>
        </select>
    </div>

    <div class="metrics-grid">
        <div class="box"><h3>Velocity</h3><div class="val" id="v">0.0</div><span class="unit">mm/s</span></div>
        <div class="box"><h3>Acceleration</h3><div class="val" id="a">0.0</div><span class="unit">g</span></div>
        <div class="box"><h3>Temperature</h3><div class="val" id="t">0.0</div><span class="unit">°C</span></div>
        <div class="box"><h3>Mag. Flux</h3><div class="val" id="f">0.0</div><span class="unit">T</span></div>
        <div class="box"><h3>RPM</h3><div class="val" id="r">0</div><span class="unit">RPM</span></div>
        <div class="box"><h3>Ultrasound</h3><div class="val" id="u">0.0</div><span class="unit">dB</span></div>
    </div>

    <div class="chart-container">
        <canvas id="liveChart"></canvas>
    </div>

    <script>
        let chart;
        const ctx = document.getElementById('liveChart').getContext('2d');

        function initChart() {
            chart = new Chart(ctx, {
                type: 'line',
                data: { labels: Array(20).fill(''), datasets: [{ data: Array(20).fill(0), borderColor: '#4facfe', borderWidth: 2, fill: true, backgroundColor: 'rgba(79,172,254,0.1)', pointRadius: 0 }] },
                options: { responsive:true, maintainAspectRatio:false, scales: { x:{display:false}, y:{grid:{color:'#334155'}} }, plugins:{legend:{display:false}} }
            });
        }

        async function syncData() {
            const site = document.getElementById('siteSelect').value;
            if(!site) return; // Jab tak site select nahi hogi, data nahi aayega (As per Page 2)

            try {
                const res = await fetch('/api/status');
                const d = await res.json();
                const m = d.metrics;

                // Update Boxes
                document.getElementById('v').innerText = m.velocity;
                document.getElementById('a').innerText = m.acceleration;
                document.getElementById('t').innerText = m.temp;
                document.getElementById('f').innerText = m.flux;
                document.getElementById('r').innerText = m.rpm;
                document.getElementById('u').innerText = m.ultrasound;

                // Update Graph
                chart.data.datasets[0].data.shift();
                chart.data.datasets[0].data.push(m.velocity);
                chart.update('none');

                document.getElementById('status').innerText = "● ONLINE";
                document.getElementById('status').style.color = "#00ff00";
            } catch (e) {
                document.getElementById('status').innerText = "● OFFLINE";
            }
        }

        window.onload = () => { initChart(); setInterval(syncData, 1500); };
    </script>
</body>
</html>
