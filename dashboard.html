<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NeuroVibe User Dashboard</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        :root { --blue: #4facfe; --orange: #ff9933; --bg: #0f172a; --card: #1e293b; }
        body { background: var(--bg); color: white; font-family: sans-serif; padding: 15px; }
        .header { display: flex; justify-content: space-between; border-bottom: 2px solid var(--orange); padding: 10px; border-radius: 8px; background: var(--card); margin-bottom: 15px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .box { background: var(--card); padding: 15px; border-radius: 8px; text-align: center; border: 1px solid #334155; }
        .val { font-size: 22px; color: var(--blue); font-weight: bold; }
        .unit { font-size: 10px; color: var(--orange); }
        select { background: var(--card); color: white; border: 1px solid var(--blue); padding: 8px; border-radius: 5px; width: 48%; }
    </style>
</head>
<body>

    <div class="header">
        <div><b>NEUROVIBE AI</b><br><small>NV-8699 SYSTEM</small></div>
        <div id="badge" style="color:var(--orange);">● CONNECTING...</div>
    </div>

    <!-- Site Selection (As per Page 2 Logic) -->
    <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
        <select id="site"><option value="">Select Site (e.g. Ammonia Pump)</option><option value="p1">Ammonia Pump</option></select>
        <select id="mode"><option value="trend">MODE: OVERALL TREND</option><option value="fft">MODE: SPECTRUM (FFT)</option></select>
    </div>

    <div class="grid">
        <div class="box"><h3>Velocity</h3><div id="v" class="val">0.0</div><span class="unit">mm/s</span></div>
        <div class="box"><h3>Acceleration</h3><div id="a" class="val">0.0</div><span class="unit">g</span></div>
        <div class="box"><h3>Temperature</h3><div id="t" class="val">0.0</div><span class="unit">°C</span></div>
        <div class="box"><h3>Flux</h3><div id="f" class="val">0.0</div><span class="unit">T</span></div>
        <div class="box"><h3>RPM</h3><div id="r" class="val">0</div><span class="unit">RPM</span></div>
        <div class="box"><h3>Ultrasound</h3><div id="u" class="val">0.0</div><span class="unit">dB</span></div>
    </div>

    <div style="background:var(--card); padding:15px; border-radius:10px; height:200px;">
        <canvas id="chart"></canvas>
    </div>

    <script>
        let chart;
        const ctx = document.getElementById('chart').getContext('2d');
        chart = new Chart(ctx, { type: 'line', data: { labels: Array(20).fill(''), datasets: [{ data: Array(20).fill(0), borderColor: '#4facfe', borderWidth: 2, fill: true, backgroundColor: 'rgba(79,172,254,0.1)', pointRadius: 0 }] }, options: { responsive:true, maintainAspectRatio:false, scales: { x:{display:false}, y:{grid:{color:'#334155'}} }, plugins:{legend:{display:false}} } });

        async function sync() {
            if(!document.getElementById('site').value) return; // Jab tak site select na ho
            try {
                const res = await fetch('/api/status');
                const d = await res.json();
                const m = d.metrics;
                
                document.getElementById('v').innerText = m.velocity;
                document.getElementById('a').innerText = m.acceleration;
                document.getElementById('t').innerText = m.temp;
                document.getElementById('f').innerText = m.flux;
                document.getElementById('r').innerText = m.rpm;
                document.getElementById('u').innerText = m.ultrasound;

                chart.data.datasets[0].data.shift();
                chart.data.datasets[0].data.push(m.velocity);
                chart.update('none');
                document.getElementById('badge').innerText = "● ONLINE";
                document.getElementById('badge').style.color = "#00ff00";
            } catch (e) { document.getElementById('badge').innerText = "● OFFLINE"; }
        }
        setInterval(sync, 1500);
    </script>
</body>
</html>
