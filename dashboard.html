<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroVibe Dashboard</title>
    <!-- Chart.js and Fonts -->
    <script src="https://cdn.jsdelivr.net"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root { --blue: #4facfe; --orange: #ff9933; --bg: #0f172a; --card: #1e293b; }
        body { margin: 0; padding: 15px; font-family: 'Roboto', sans-serif; background: var(--bg); color: white; }
        
        /* Header Fix */
        .header { display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 12px 15px; border-radius: 12px; border-bottom: 2px solid var(--orange); margin-bottom: 20px; }
        .logo-section { display: flex; align-items: center; gap: 10px; }
        .logo-placeholder { background: white; padding: 4px; border-radius: 5px; height: 35px; width: 35px; display: flex; align-items: center; justify-content: center; }
        
        .brand-name h1 { margin: 0; font-family: 'Orbitron'; font-size: 15px; color: var(--blue); }
        .brand-name p { margin: 0; font-size: 8px; color: var(--orange); letter-spacing: 1px; }

        /* Metrics Boxes */
        .metrics-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
        .box { background: var(--card); padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #334155; }
        .box h3 { margin: 0; font-size: 10px; color: #94a3b8; text-transform: uppercase; }
        .val { font-size: 20px; font-weight: bold; margin: 8px 0; color: #fff; }
        .unit { font-size: 10px; color: var(--orange); }

        /* Chart Area */
        .chart-container { background: var(--card); padding: 15px; border-radius: 15px; height: 280px; border: 1px solid #334155; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-section">
            <div class="logo-placeholder">
                <img src="logo.png" alt="NV" style="height: 100%; width: auto;" onerror="this.src='https://via.placeholder.com'">
            </div>
            <div class="brand-name">
                <h1>NEUROVIBE AI</h1>
                <p>Technologies Pvt Ltd</p>
            </div>
        </div>
        <div style="color:#00ff00; font-size:10px; font-weight:bold;">● ONLINE</div>
    </div>

    <div class="metrics-grid">
        <div class="box"><h3>Velocity</h3><div class="val" id="vel">4.2 <span class="unit">mm/s</span></div></div>
        <div class="box"><h3>RPM</h3><div class="val" id="rpm">1450 <span class="unit">RPM</span></div></div>
        <div class="box"><h3>Temp</h3><div class="val" id="temp">38.4 <span class="unit">°C</span></div></div>
        <div class="box"><h3>Flux</h3><div class="val" id="flux">0.12 <span class="unit">T</span></div></div>
    </div>

    <div class="chart-container">
        <p style="color:var(--blue); font-size:12px; margin-top:0; font-family:'Orbitron'">Live Vibration Spectrum</p>
        <canvas id="liveChart"></canvas>
    </div>

    <script>
        // Graph Initialization
        const ctx = document.getElementById('liveChart').getContext('2d');
        const liveChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array(30).fill(''),
                datasets: [{
                    data: Array(30).fill(0).map(() => Math.random() * 5),
                    borderColor: '#4facfe',
                    backgroundColor: 'rgba(79, 172, 254, 0.1)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.4,
                    pointRadius: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: { 
                    y: { grid: { color: '#334155' }, ticks: { display: false } },
                    x: { grid: { display: false } }
                },
                plugins: { legend: { display: false } }
            }
        });

        // Backend Sync Logic
        async function refreshData() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                
                if (data.status === "Online") {
                    document.getElementById('vel').innerHTML = `${data.metrics.velocity} <span class="unit">mm/s</span>`;
                    document.getElementById('rpm').innerText = data.metrics.rpm;
                    document.getElementById('temp').innerHTML = `${data.metrics.temp} <span class="unit">°C</span>`;
                    
                    // Moving Graph logic
                    liveChart.data.datasets[0].data.shift();
                    liveChart.data.datasets[0].data.push(Math.random() * 8);
                    liveChart.update('none');
                }
            } catch (err) { console.log("Offline Check"); }
        }

        setInterval(refreshData, 2000);
    </script>
</body>
</html>
