<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroVibe AI Technologies Pvt Ltd | Dashboard</title>
    <!-- Graph ke liye Chart.js -->
    <script src="https://cdn.jsdelivr.net"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root { --blue: #4facfe; --orange: #ff9933; --bg: #0d1117; --card: #161b22; --border: #334155; }
        body { margin:0; font-family:'Roboto', sans-serif; background:var(--bg); color:white; padding:12px; overflow-x:hidden; }
        
        /* Header Fix: No 8699 */
        .header { display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid var(--orange); padding-bottom:10px; margin-bottom:15px; }
        .logo-box { background:white; padding:4px; border-radius:6px; height:35px; width:35px; display:flex; align-items:center; justify-content:center; }
        .brand b { font-family:'Orbitron'; color:var(--blue); font-size:15px; letter-spacing:1px; }
        .brand small { color:var(--orange); font-size:8px; display:block; font-weight:bold; text-transform:uppercase; }
        #st-badge { font-size:10px; font-weight:bold; color:var(--orange); padding:4px 8px; border-radius:15px; border:1px solid var(--orange); }

        /* Metrics Grid */
        .grid { display:grid; grid-template-columns:repeat(3, 1fr); gap:8px; margin-bottom:15px; }
        .box { background:var(--card); border:1px solid var(--border); padding:15px 5px; border-radius:10px; text-align:center; }
        .val { font-size:20px; font-weight:bold; color:var(--blue); margin:5px 0; }
        .unit { font-size:8px; color:var(--orange); font-weight:bold; display:block; }

        /* Admin/Inventory (PDF Logic Page 1 & 3) */
        .admin-card { background:var(--card); border:1px solid var(--orange); padding:15px; border-radius:12px; margin-top:20px; }
        .admin-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
        .admin-box { border:1px dashed #4facfe; padding:10px; border-radius:8px; }
        button { background:var(--blue); color:white; border:none; padding:10px; border-radius:6px; cursor:pointer; width:100%; font-weight:bold; font-size:11px; margin-top:8px; }
        .btn-orange { background:var(--orange); }
        input { background:#0d1117; border:1px solid var(--border); color:white; padding:8px; width:100%; border-radius:6px; font-size:10px; margin-top:5px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div class="header">
        <div style="display:flex; align-items:center; gap:10px;">
            <div class="logo-box">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org">
                    <circle cx="50" cy="50" r="45" fill="#4facfe" />
                    <path d="M30 70 L50 30 L70 70 Z" fill="white" />
                    <circle cx="50" cy="55" r="10" fill="#ff9933" />
                </svg>
            </div>
            <div class="brand"><b>NEUROVIBE AI</b><small>Technologies Pvt Ltd</small></div>
        </div>
        <div id="st-badge">● CONNECTING...</div>
    </div>

    <!-- Live Data Grid -->
    <div class="grid">
        <div class="box"><div style="font-size:9px; color:gray;">Velocity</div><div id="v" class="val">0.0</div><span class="unit">MM/S</span></div>
        <div class="box"><div style="font-size:9px; color:gray;">Acceleration</div><div id="a" class="val">0.0</div><span class="unit">G</span></div>
        <div class="box"><div style="font-size:9px; color:gray;">Temperature</div><div id="t" class="val">0.0</div><span class="unit">°C</span></div>
        <div class="box"><div style="font-size:9px; color:gray;">Mag. Flux</div><div id="f" class="val">0.0</div><span class="unit">T</span></div>
        <div class="box"><div style="font-size:9px; color:gray;">Max RPM</div><div id="r" class="val">0</div><span class="unit">RPM</span></div>
        <div class="box"><div style="font-size:9px; color:gray;">Ultrasound</div><div id="u" class="val">0.0</div><span class="unit">DB</span></div>
    </div>

    <!-- ADMIN PANEL: INVENTORY & PROVISIONING (PDF LOGIC) -->
    <div class="admin-card">
        <h3 style="color:var(--orange); font-size:11px; margin-top:0;">ADMIN: INVENTORY & PROVISIONING</h3>
        <div class="admin-grid">
            <div class="admin-box">
                <p style="font-size:9px; color:#4facfe; margin:0;">1. INVENTORY (GATEWAY / NODE)</p>
                <select style="background:#0d1117; color:white; border:1px solid var(--border); padding:5px; width:100%; font-size:10px;"><option>FOR GATEWAY</option><option>FOR NODE</option></select>
                <button onclick="window.location.href='/api/export'">EXPORT (.xlsx)</button>
            </div>
            <div class="admin-box">
                <p style="font-size:9px; color:var(--orange); margin:0;">2. DYNAMIC TOKEN (ASK TOKEN)</p>
                <input type="text" id="mac" placeholder="Enter MAC ID">
                <!-- Har baar naya token aayega -->
                <button class="btn-orange" onclick="askDynamicToken()">ASK TOKEN NO</button>
            </div>
        </div>
        <div id="tk-result" style="text-align:center; color:#00ff00; font-weight:bold; margin-top:10px; font-size:14px;"></div>
    </div>

    <script>
        // Live Data Sync Logic
        async function sync() {
            try {
                const res = await fetch('/api/status');
                const d = await res.json();
                const m = d.metrics;
                document.getElementById('v').innerText = m.velocity;
                document.getElementById('a').innerText = m.acceleration;
                document.getElementById('t').innerText = m.temp;
                document.getElementById('f').innerText = m.flux;
                document.getElementById('r').innerText = m.rpm;
                document.getElementById('u').innerText = m.ultrasound;
                document.getElementById('st-badge').innerText = "● ONLINE";
                document.getElementById('st-badge').style.color = "#00ff00";
            } catch (e) { document.getElementById('st-badge').innerText = "● CONNECTING..."; }
        }

        // PDF Logic Page 3: Dynamic Token (Server Call)
        async function askDynamicToken() {
            try {
                const res = await fetch('/api/get-token'); // Relative URL for Vercel
                const data = await res.json();
                document.getElementById('tk-result').innerText = "NEW TOKEN: " + data.token;
            } catch (e) {
                // Offline fallback logic
                const fallback = "NV-" + Math.floor(100000 + Math.random() * 900000);
                document.getElementById('tk-result').innerText = "TOKEN: " + fallback + " (Demo)";
            }
        }

        setInterval(sync, 2000);
        window.onload = sync;
    </script>
</body>
</html>
