<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroVibe AI | Dashboard 8699</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root { --bhagwa: #FF9933; --dark-bg: #0a0e14; --card-bg: #161b22; --text-gray: #8b949e; }
        body { margin: 0; background: var(--dark-bg); color: white; font-family: 'Roboto', sans-serif; padding: 15px; }
        
        /* Header Section */
        .header { display: flex; justify-content: space-between; border-bottom: 2px solid var(--bhagwa); padding-bottom: 10px; margin-bottom: 20px; }
        .logo-box { font-family: 'Orbitron'; font-size: 18px; color: var(--bhagwa); }
        .status-tag { background: #008000; color: white; padding: 2px 10px; border-radius: 5px; font-size: 12px; }

        /* Controls Section */
        .controls { display: flex; gap: 10px; margin-bottom: 20px; }
        select { background: #1c2128; border: 1px solid #30363d; color: white; padding: 8px; border-radius: 5px; width: 100%; }

        /* Grid Layout for Tiles */
        .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .tile { background: var(--card-bg); padding: 15px; border-radius: 8px; text-align: center; border: 1px solid #30363d; }
        .tile-label { font-size: 10px; color: var(--text-gray); text-transform: uppercase; letter-spacing: 1px; }
        .tile-value { font-size: 24px; font-weight: bold; margin: 10px 0; color: #58a6ff; }
        .tile-unit { font-size: 12px; color: var(--bhagwa); }

        /* Graph Section */
        .graph-card { background: var(--card-bg); padding: 15px; border-radius: 8px; border: 1px solid #30363d; height: 250px; }
        .graph-label { color: #58a6ff; font-size: 12px; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-box">NEUROVIBE AI <br><small style="font-size: 9px; color: white;">PREDICTIVE MAINTENANCE 8699</small></div>
        <div><span class="status-tag">● ONLINE</span></div>
    </div>

    <div class="controls">
        <select><option>Ammonia Pump (Main)</option></select>
        <select><option>MODE: SPECTRUM (FFT)</option></select>
    </div>

    <!-- 6 Core Metrics Grid -->
    <div class="grid-container">
        <div class="tile"><div class="tile-label">Velocity</div><div class="tile-value" id="val-vel">0.0</div><div class="tile-unit">mm/s</div></div>
        <div class="tile"><div class="tile-label">Acceleration</div><div class="tile-value" id="val-acc">0.0</div><div class="tile-unit">g</div></div>
        <div class="tile"><div class="tile-label">Temperature</div><div class="tile-value" id="val-temp">0.0</div><div class="tile-unit">°C</div></div>
        <div class="tile"><div class="tile-label">Max RPM</div><div class="tile-value" id="val-rpm">0</div><div class="tile-unit">RPM</div></div>
        <div class="tile"><div class="tile-label">Flux</div><div class="tile-value" id="val-flux">0</div><div class="tile-unit">Wb</div></div>
        <div class="tile"><div class="tile-label">Ultrasound</div><div class="tile-value" id="val-ult">0.0</div><div class="tile-unit">dB</div></div>
    </div>

    <!-- Live Trend Graph -->
    <div class="graph-card">
        <span class="graph-label">LIVE VIBRATION TREND</span>
        <canvas id="vibeChart" style="width: 100%; height: 200px;"></canvas>
    </div>

    <script>
        // Graph Initialization
        const ctx = document.getElementById('vibeChart').getContext('2d');
        const vibeChart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'Vibration (g)', data: [], borderColor: '#FF9933', backgroundColor: 'rgba(255, 153, 51, 0.1)', fill: true, tension: 0.4 }] },
            options: { scales: { x: { display: false }, y: { beginAtZero: true, grid: { color: '#30363d' } } }, plugins: { legend: { display: false } } }
        });

        // Function to Fetch Data from Backend
        async function fetchSensorData() {
            try {
                // Point to your merged Vercel API
                const response = await fetch('/api/latest-data'); 
                const data = await response.json();

                // Update Tiles
                document.getElementById('val-vel').innerText = data.velocity || "1.2";
                document.getElementById('val-acc').innerText = data.acceleration || "0.05";
                document.getElementById('val-temp').innerText = data.temperature || "42.1";
                document.getElementById('val-rpm').innerText = data.rpm || "1450";
                document.getElementById('val-flux').innerText = data.flux || "88";
                document.getElementById('val-ult').innerText = data.ultrasound || "12.4";

                // Update Chart
                if (vibeChart.data.labels.length > 20) { vibeChart.data.labels.shift(); vibeChart.data.datasets[0].data.shift(); }
                vibeChart.data.labels.push(new Date().toLocaleTimeString());
                vibeChart.data.datasets[0].data.push(data.acceleration || Math.random() * 0.1);
                vibeChart.update('none');

            } catch (err) { console.log("Waiting for backend..."); }
        }

        setInterval(fetchSensorData, 2000); // Har 2 second mein data update
    </script>
</body>
</html>
