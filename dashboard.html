<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroVibe AI | Predictive Maintenance</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        :root { --bhagwa: #FF9933; --bg: #0d1117; --card: #161b22; --border: #30363d; --blue-text: #58a6ff; --gray-text: #8b949e; }
        body { background-color: var(--bg); color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; margin: 0; padding: 12px; overflow-x: hidden; }
        
        /* Header */
        .header { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 15px; }
        .logo-section { line-height: 1.2; }
        .logo-main { color: var(--bhagwa); font-weight: bold; font-size: 13px; letter-spacing: 0.5px; }
        .logo-sub { color: var(--gray-text); font-size: 8px; text-transform: uppercase; }
        .online-tag { background: #238636; color: white; font-size: 9px; padding: 2px 8px; border-radius: 4px; font-weight: bold; }

        /* Dropdowns */
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        select { background: var(--card); border: 1px solid var(--border); color: white; padding: 8px; border-radius: 6px; font-size: 11px; outline: none; }

        /* 3x2 Grid */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 18px 5px; border-radius: 6px; text-align: center; }
        .card-label { color: var(--gray-text); font-size: 9px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .card-value { color: var(--blue-text); font-size: 24px; font-weight: 600; margin-bottom: 4px; }
        .card-unit { color: var(--bhagwa); font-size: 9px; font-weight: bold; }

        /* Graph Section */
        .graph-container { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 12px; height: 180px; }
        .graph-title { color: var(--blue-text); font-size: 10px; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-section">
            <div class="logo-main">NEUROVIBE AI</div>
            <div class="logo-sub">PREDICTIVE MAINTENANCE 8699</div>
        </div>
        <div class="online-tag">● ONLINE</div>
    </div>

    <div class="controls">
        <select><option>Ammonia Pump (Main)</option></select>
        <select><option>MODE: SPECTRUM (FFT)</option></select>
    </div>

    <!-- The 6 Tiles Grid -->
    <div class="grid">
        <div class="card"><div class="card-label">Velocity</div><div class="card-value" id="v">0.0</div><div class="card-unit">MM/S</div></div>
        <div class="card"><div class="card-label">Acceleration</div><div class="card-value" id="a">0.0</div><div class="card-unit">G</div></div>
        <div class="card"><div class="card-label">Temperature</div><div class="card-value" id="t">0.0</div><div class="card-unit">°C</div></div>
        <div class="card"><div class="card-label">Max RPM</div><div class="card-value" id="r">0</div><div class="card-unit">RPM</div></div>
        <div class="card"><div class="card-label">Flux</div><div class="card-value" id="f">0</div><div class="card-unit">WB</div></div>
        <div class="card"><div class="card-label">Ultrasound</div><div class="card-value" id="u">0.0</div><div class="card-unit">DB</div></div>
    </div>

    <!-- Live Chart -->
    <div class="graph-container">
        <div class="graph-title">LIVE VIBRATION TREND</div>
        <canvas id="liveChart" style="width:100%; height:130px;"></canvas>
    </div>

    <script>
        // 1. Chart.js Initialization
        const ctx = document.getElementById('liveChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ data: [], borderColor: '#FF9933', borderWidth: 2, pointRadius: 0, fill: false, tension: 0.4 }] },
            options: { responsive: true, maintainAspectRatio: false, scales: { x: { display: false }, y: { grid: { color: '#30363d' }, ticks: { color: '#8b949e', font: { size: 10 } } } }, plugins: { legend: { display: false } } }
        });

        // 2. Fetch Logic (Connecting to your Python Backend)
        async function fetchMetrics() {
            try {
                // Fetching from your Backend /api/status route
                const response = await fetch('/api/status');
                const data = await response.json();
                
                if (data.metrics) {
                    const m = data.metrics;

                    // Update UI Tiles using IDs
                    document.getElementById('v').innerText = m.velocity;
                    document.getElementById('a').innerText = m.acceleration;
                    document.getElementById('t').innerText = m.temp;
                    document.getElementById('r').innerText = m.rpm;
                    document.getElementById('f').innerText = m.flux;
                    document.getElementById('u').innerText = m.ultrasound;

                    // Update Real-time Graph (Acceleration)
                    if (chart.data.labels.length > 30) { chart.data.labels.shift(); chart.data.datasets[0].data.shift(); }
                    chart.data.labels.push("");
                    chart.data.datasets[0].data.push(m.acceleration);
                    chart.update('none');
                }
            } catch (error) {
                console.log("Searching for NeuroVibe Backend...");
            }
        }

        // Refresh every 2 seconds
        setInterval(fetchMetrics, 2000);
        fetchMetrics(); // Initial call
    </script>
</body>
</html>
