<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroVibe AI Technologies Pvt Ltd | System</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root { --blue: #4facfe; --orange: #ff9933; --bg: #0d1117; --card: #161b22; --border: #334155; }
        body { margin:0; font-family:'Roboto', sans-serif; background:var(--bg); color:white; padding:12px; overflow-x:hidden; }
        
        /* Header: Brand Identity (No 8699) */
        .header { display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid var(--orange); padding-bottom:10px; margin-bottom:15px; }
        .logo-section { display:flex; align-items:center; gap:10px; }
        .logo-box { background:white; padding:4px; border-radius:6px; height:32px; width:32px; display:flex; align-items:center; justify-content:center; }
        .brand b { font-family:'Orbitron'; color:var(--blue); font-size:14px; letter-spacing:1px; }
        .brand small { color:var(--orange); font-size:8px; display:block; font-weight:bold; text-transform:uppercase; }
        #st-badge { font-size:9px; font-weight:bold; color:#00ff00; padding:2px 8px; border-radius:15px; border:1px solid #00ff00; background:rgba(0,255,0,0.1); }

        /* Metrics Grid */
        .grid { display:grid; grid-template-columns:repeat(3, 1fr); gap:8px; margin-bottom:15px; }
        .box { background:var(--card); border:1px solid var(--border); padding:15px 5px; border-radius:10px; text-align:center; }
        .box h3 { margin:0; font-size:9px; color:#94a3b8; text-transform:uppercase; letter-spacing:0.5px; }
        .val { font-size:18px; font-weight:bold; color:var(--blue); margin:5px 0; }
        .unit { font-size:8px; color:var(--orange); font-weight:bold; display:block; }

        /* Admin/Inventory Section (PDF Logic Page 1 & 3) */
        .admin-card { background:var(--card); border:1px solid var(--orange); padding:12px; border-radius:12px; margin-top:10px; }
        .admin-card h4 { color:var(--orange); font-size:10px; margin:0 0 10px 0; border-bottom:1px solid #334155; padding-bottom:5px; text-transform:uppercase; }
        .admin-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
        .admin-box { border:1px dashed #4facfe; padding:8px; border-radius:8px; }
        .admin-box p { font-size:8px; color:#4facfe; margin:0 0 5px 0; font-weight:bold; text-transform:uppercase; }
        
        /* Form Inputs */
        select, input { background:#0d1117; border:1px solid var(--border); color:white; padding:6px; width:100%; border-radius:5px; font-size:10px; margin-bottom:5px; box-sizing: border-box; outline:none; }
        button { background:var(--blue); color:white; border:none; padding:8px; border-radius:5px; cursor:pointer; width:100%; font-weight:bold; font-size:10px; transition: 0.3s; }
        .btn-orange { background:var(--orange); }
        #token-display { text-align:center; color:#00ff00; font-weight:bold; margin-top:8px; font-size:13px; min-height: 15px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-section">
            <div class="logo-box">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org">
                    <circle cx="50" cy="50" r="45" fill="#4facfe" />
                    <path d="M30 70 L50 30 L70 70 Z" fill="white" />
                    <circle cx="50" cy="55" r="10" fill="#ff9933" />
                </svg>
            </div>
            <div class="brand"><b>NEUROVIBE AI</b><small>Technologies Pvt Ltd</small></div>
        </div>
        <div id="st-badge">● ONLINE</div>
    </div>

    <!-- Live Data Grid -->
    <div class="grid">
        <div class="box"><h3>Velocity</h3><div id="v" class="val">4.32</div><span class="unit">MM/S</span></div>
        <div class="box"><h3>Acceleration</h3><div id="a" class="val">1.06</div><span class="unit">G</span></div>
        <div class="box"><h3>Temp</h3><div id="t" class="val">41.2</div><span class="unit">°C</span></div>
        <div class="box"><h3>Flux</h3><div id="f" class="val">0.094</div><span class="unit">T</span></div>
        <div class="box"><h3>RPM</h3><div id="r" class="val">1468</div><span class="unit">RPM</span></div>
        <div class="box"><h3>Ultrasound</h3><div id="u" class="val">26.9</div><span class="unit">DB</span></div>
    </div>

    <!-- ADMIN PANEL (The "dikkat" is fixed here) -->
    <div class="admin-card">
        <h4>Admin: Inventory & Provisioning</h4>
        <div class="admin-grid">
            
            <!-- 1. Inventory Logic (Page 1) -->
            <div class="admin-box">
                <p>1. Inventory (Gateway / Node)</p>
                <select id="invType">
                    <option value="gateway">GATEWAY COLUMN (IMEI)</option>
                    <option value="node">NODE COLUMN (BLE MAC)</option>
                </select>
                <input type="file" id="excelInput" style="padding:2px;">
                <div style="display:flex; gap:5px;">
                    <button onclick="alert('Uploading File...')">IMPORT</button>
                    <button class="btn-orange" onclick="window.location.href='/api/export'">EXPORT (.xlsx)</button>
                </div>
            </div>

            <!-- 2. Provisioning Logic (Page 3) -->
            <div class="admin-box">
                <p>2. Provisioning (Ask Token)</p>
                <select id="discovery">
                    <option value="">MAC ID Unknown? Discovery Mode</option>
                    <option value="mac1">NEW GATEWAY (Detected: F1:B2)</option>
                    <option value="mac2">NEW NODE (Detected: A5:C8)</option>
                </select>
                <input type="text" id="manualMac" placeholder="OR Enter MAC ID Manually">
                <button onclick="getDynamicToken()">ASK TOKEN NO</button>
            </div>

        </div>
        <div id="token-display"></div>
    </div>

    <script>
        // Live Data Sync (Har 1.5 second mein random change for simulation)
        async function sync() {
            try {
                const res = await fetch('/api/status');
                const d = await res.json();
                const m = d.metrics;
                
                document.getElementById('v').innerText = m.velocity;
                document.getElementById('a').innerText = m.acceleration;
                document.getElementById('t').innerText = m.temp;
                document.getElementById('f').innerText = m.flux;
                document.getElementById('r').innerText = m.rpm;
                document.getElementById('u').innerText = m.ultrasound;
            } catch (e) { console.log("Sync Error"); }
        }

        // Dynamic Token Generator (As per Page 3)
        async function getDynamicToken() {
            try {
                const res = await fetch('/api/get-token');
                const d = await res.json();
                document.getElementById('token-display').innerText = "NEW TOKEN: " + d.token;
            } catch (e) {
                // Fallback if backend offline
                const fallback = "NV-" + Math.floor(100000 + Math.random() * 900000);
                document.getElementById('token-display').innerText = "NEW TOKEN: " + fallback + " (Demo)";
            }
        }

        setInterval(sync, 1500);
    </script>
</body>
</html>
