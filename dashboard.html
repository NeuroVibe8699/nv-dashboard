<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | NeuroVibe AI Technologies</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        :root {
            --neuro-blue: #4facfe;
            --neuro-orange: #ff9933;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
        }

        body { margin: 0; padding: 20px; font-family: 'Roboto', sans-serif; background-color: var(--bg-dark); color: white; }

        /* Professional Header with Embedded Logo */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            padding: 15px 25px;
            border-radius: 15px;
            border-bottom: 3px solid var(--neuro-orange);
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .logo-section { display: flex; align-items: center; gap: 15px; }

        /* Logo Code (Directly inside CSS/HTML) */
        .logo-box {
            height: 50px;
            width: 50px;
            background: white;
            padding: 5px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .brand-text h1 { margin: 0; font-family: 'Orbitron', sans-serif; font-size: 20px; color: var(--neuro-blue); letter-spacing: 1px; }
        .brand-text p { margin: 0; font-size: 10px; color: var(--neuro-orange); letter-spacing: 2px; text-transform: uppercase; }

        .status-badge { background: rgba(0, 255, 0, 0.1); color: #00ff00; padding: 8px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; border: 1px solid #00ff00; }

        /* Metrics Grid */
        .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .metric-card { background: var(--card-bg); padding: 20px; border-radius: 15px; text-align: center; border-left: 4px solid var(--neuro-blue); transition: 0.3s; }
        .metric-value { font-size: 28px; font-weight: bold; margin: 10px 0; color: white; }
        .unit { font-size: 14px; color: var(--neuro-orange); }

        .chart-box { background: var(--card-bg); padding: 25px; border-radius: 15px; border: 1px solid #334155; }
        canvas { width: 100% !important; height: 300px !important; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-section">
            <div class="logo-box">
                <!-- Direct Logo Code (Base64) -->
                <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48Y2lyY2xlIGN4PSI1MCIgY3k9IjUwIiByPSI0MCIgZmlsbD0id2hpdGUiLz48cGF0aCBkPSJNNTAgMjAgTDIwIDgwIEw4MCA4MCBaIiBmaWxsPSIjNGZhY2ZlIi8+PHBhdGggZD0iTTUwIDQwIEwzNSA3NSBMNjUgNzUgWiIgZmlsbD0iI2ZmOTkzMyIvPjwvc3ZnPg==" alt="NV Logo" style="height: 100%;">
            </div>
            <div class="brand-text">
                <h1>NEUROVIBE AI</h1>
                <p>Technologies Pvt Ltd</p>
            </div>
        </div>
        <div class="status-badge">● SYSTEM ONLINE</div>
    </div>

    <div class="metrics-grid">
        <div class="metric-card"><h3>Velocity</h3><div class="metric-value" id="val-vel">4.2 <span class="unit">mm/s</span></div></div>
        <div class="metric-card"><h3>RPM</h3><div class="metric-value" id="val-rpm">1450 <span class="unit">RPM</span></div></div>
        <div class="metric-card"><h3>Temp</h3><div class="metric-value" id="val-temp">38.4 <span class="unit">°C</span></div></div>
        <div class="metric-card"><h3>Flux</h3><div class="metric-value" id="val-flux">0.12 <span class="unit">T</span></div></div>
    </div>

    <div class="chart-box">
        <h3 style="margin-top:0; color:var(--neuro-blue); font-family:'Orbitron'">Live Vibration Spectrum</h3>
        <canvas id="vibrationChart"></canvas>
    </div>

    <script>
        const ctx = document.getElementById('vibrationChart').getContext('2d');
        const vibrationChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array.from({length: 30}, (_, i) => i),
                datasets: [{
                    label: 'Vibration',
                    data: Array.from({length: 30}, () => Math.random() * 2),
                    borderColor: '#4facfe',
                    backgroundColor: 'rgba(79, 172, 254, 0.1)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.4
                }]
            },
            options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { grid: { color: '#334155' } }, x: { grid: { display: false } } } }
        });

        async function updateData() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                if(data.status === "Online") {
                    document.getElementById('val-vel').innerHTML = `${data.metrics.velocity} <span class="unit">mm/s</span>`;
                    document.getElementById('val-rpm').innerHTML = `${data.metrics.rpm} <span class="unit">RPM</span>`;
                    document.getElementById('val-temp').innerHTML = `${data.metrics.temp} <span class="unit">°C</span>`;
                    
                    vibrationChart.data.datasets[0].data.shift();
                    vibrationChart.data.datasets[0].data.push(Math.random() * 3);
                    vibrationChart.update('none');
                }
            } catch (e) { console.log("Fetch Error"); }
        }
        setInterval(updateData, 2000);
    </script>
</body>
</html>
