<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | NeuroVibe AI Technologies</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        :root { --blue: #4facfe; --orange: #ff9933; --bg: #0d1117; --card: #161b22; }
        body { margin:0; font-family: sans-serif; background:var(--bg); color:white; padding:12px; }
        .header { display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid var(--orange); padding-bottom:10px; margin-bottom:15px; }
        .grid { display:grid; grid-template-columns:repeat(3, 1fr); gap:8px; margin-bottom:15px; }
        .box { background:var(--card); border: 1px solid #334155; padding:15px; border-radius:10px; text-align:center; }
        .val { font-size:20px; font-weight:bold; color:var(--blue); }
        .admin { background:var(--card); border: 1px solid var(--orange); padding:15px; border-radius:12px; }
        button { background:var(--blue); color:white; border:none; padding:8px; border-radius:6px; cursor:pointer; width:100%; font-weight:bold; margin-top:5px; }
    </style>
</head>
<body>
    <div class="header">
        <div><b style="color:var(--blue); font-size:14px;">NEUROVIBE AI</b><br><small style="color:var(--orange); font-size:8px;">Technologies Pvt Ltd</small></div>
        <div id="st" style="color:var(--orange); font-size:9px;">● CONNECTING...</div>
    </div>
    <div class="grid">
        <div class="box"><h3>Velocity</h3><div class="val" id="v">0.0</div></div>
        <div class="box"><h3>Acceleration</h3><div class="val" id="a">0.0</div></div>
        <div class="box"><h3>Temp</h3><div class="val" id="t">0.0</div></div>
        <div class="box"><h3>Flux</h3><div class="val" id="f">0.0</div></div>
        <div class="box"><h3>RPM</h3><div class="val" id="r">0</div></div>
        <div class="box"><h3>Ultrasound</h3><div class="val" id="u">0.0</div></div>
    </div>
    <div class="admin">
        <p style="font-size:10px; color:var(--orange);">ADMIN: INVENTORY & PROVISIONING</p>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <div><button onclick="window.location.href='/api/export'">EXPORT EXCEL</button></div>
            <div><button onclick="askToken()" style="background:var(--orange);">ASK TOKEN NO</button></div>
        </div>
        <div id="tk" style="text-align:center; color:#00ff00; font-weight:bold; margin-top:10px;"></div>
    </div>
    <script>
        async function sync() {
            try {
                const res = await fetch('/api/status');
                const d = await res.json();
                document.getElementById('v').innerText = d.metrics.velocity;
                document.getElementById('a').innerText = d.metrics.acceleration;
                document.getElementById('t').innerText = d.metrics.temp;
                document.getElementById('f').innerText = d.metrics.flux;
                document.getElementById('r').innerText = d.metrics.rpm;
                document.getElementById('u').innerText = d.metrics.ultrasound;
                document.getElementById('st').innerText = "● ONLINE"; document.getElementById('st').style.color = "#00ff00";
            } catch (e) { document.getElementById('st').innerText = "● CONNECTING..."; }
        }
        async function askToken() {
            try {
                const res = await fetch('/api/get-token');
                const d = await res.json();
                document.getElementById('tk').innerText = "NEW TOKEN: " + d.token;
            } catch (e) { alert("Server Offline!"); }
        }
        setInterval(sync, 1500);
    </script>
</body>
</html>
