<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>NeuroVibe AI | Inventory</title>
    <style>
        body { background: #0d1117; color: white; font-family: sans-serif; padding: 20px; }
        .card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .btn { padding: 10px 20px; cursor: pointer; background: #00d2ff; border: none; border-radius: 5px; font-weight: bold; }
        .type-btn { padding: 10px; margin-right: 10px; cursor: pointer; background: #30363d; border-radius: 5px; display: inline-block; }
        .active { background: #ff9933; color: white; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #30363d; }
    </style>
</head>
<body>
    <h1>Factory Inventory Master</h1>
    
    <div class="card">
        <div id="typeBox">
            <div id="nodeTab" class="type-btn active" onclick="setType('node')">NODE MODE</div>
            <div id="gwTab" class="type-btn" onclick="setType('gateway')">GATEWAY MODE</div>
        </div>
        <br>
        <input type="file" id="excelFile">
        <button class="btn" onclick="uploadData()">IMPORT EXCEL</button>
    </div>

    <div class="card">
        <h3>Live Inventory Status</h3>
        <table id="invTable">
            <thead><tr><th>Model</th><th>Serial</th><th>ID (MAC/IMEI)</th><th>Freq</th><th>Status</th></tr></thead>
            <tbody id="invBody"></tbody>
        </table>
    </div>

    <script>
        let currentType = 'node';
        function setType(t) {
            currentType = t;
            document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(t+'Tab').classList.add('active');
        }

        async function uploadData() {
            const fileInput = document.getElementById('excelFile');
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            formData.append('type', currentType);

            const res = await fetch('/api/inventory/bulk-import', { method: 'POST', body: formData });
            const data = await res.json();
            alert(data.message || data.error);
            loadData();
        }

        async function loadData() {
            const res = await fetch('/api/inventory/list');
            const data = await res.json();
            document.getElementById('invBody').innerHTML = data.map(d => `
                <tr>
                    <td>${d.model_id}</td>
                    <td>${d.serial_no}</td>
                    <td>${d.radio_mac || d.imei_id}</td>
                    <td>${d.rf_frequency} MHz</td>
                    <td>${d.device_status}</td>
                </tr>
            `).join('');
        }
        window.onload = loadData;
    </script>
</body>
</html>
