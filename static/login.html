<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroVibe AI | Login</title>
    <style>
        :root { --primary: #00d2ff; --glass: rgba(255, 255, 255, 0.1); }
        body {
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif;
            background: #0b0e14; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background-image: radial-gradient(circle at 50% 50%, #1a2a6c, #0b0e14);
        }
        .login-card {
            background: var(--glass); backdrop-filter: blur(15px);
            padding: 40px; border-radius: 20px; width: 350px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        h2 { color: var(--primary); margin-bottom: 30px; letter-spacing: 2px; }
        input {
            width: 100%; padding: 12px; margin: 10px 0;
            background: rgba(255, 255, 255, 0.05); border: 1px solid #30363d;
            border-radius: 8px; color: white; outline: none; box-sizing: border-box;
        }
        input:focus { border-color: var(--primary); }
        .btn {
            width: 100%; padding: 12px; margin-top: 20px;
            background: var(--primary); border: none; border-radius: 8px;
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn:hover { transform: scale(1.02); box-shadow: 0 0 15px var(--primary); }
        #msg { margin-top: 15px; font-size: 14px; color: #ff4d4d; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>NEUROVIBE AI</h2>
        <form id="loginForm">
            <input type="text" id="user" placeholder="Admin Email" required>
            <input type="password" id="pass" placeholder="Password" required>
            <button type="submit" class="btn">LOGIN TO DASHBOARD</button>
        </form>
        <div id="msg"></div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const msg = document.getElementById('msg');

            try {
                // Verzendt data als JSON met de keys 'u' en 'p'
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ u, p })
                });

                const result = await response.json();

                if (response.ok && result.status === "success") {
                    window.location.href = "/admin.html"; // Succesvolle redirect
                } else {
                    msg.innerText = "Invalid Credentials. Try Again.";
                }
            } catch (err) {
                msg.innerText = "Connection Error!";
            }
        });
    </script>
</body>
</html>
