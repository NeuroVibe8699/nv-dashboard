<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroVibe AI | Secure Access</title>
    <!-- Updated Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <style>
        :root {
            --primary: #00d2ff;
            --accent: #ff9933;
            --bg: #0b0e14;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at 50% 50%, #1a2a6c, #0b0e14);
            height: 100vh;
            display: flex; align-items: center; justify-content: center;
            color: white; overflow: hidden;
        }

        .login-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            padding: 40px; border-radius: 24px;
            width: 380px; border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center; animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .brand-logo {
            font-size: 28px; font-weight: 800;
            color: var(--primary); letter-spacing: 3px;
            margin-bottom: 5px; text-transform: uppercase;
        }

        .brand-subtext {
            font-size: 10px; color: var(--accent);
            font-weight: bold; letter-spacing: 2px;
            margin-bottom: 40px; display: block;
        }

        .input-group { position: relative; margin-bottom: 20px; }

        .input-group i {
            position: absolute; left: 15px; top: 50%;
            transform: translateY(-50%); color: #888;
        }

        input {
            width: 100%; padding: 14px 15px 14px 45px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid #30363d; border-radius: 12px;
            color: white; font-size: 15px; outline: none;
            transition: 0.3s; box-sizing: border-box;
        }

        input:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.07);
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.2);
        }

        .btn-login {
            width: 100%; padding: 15px; margin-top: 20px;
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            border: none; border-radius: 12px; color: #000;
            font-size: 16px; font-weight: 700; cursor: pointer;
            transition: 0.4s;
        }

        .btn-login:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
        }

        #error-msg {
            margin-top: 20px; font-size: 14px;
            color: #ff4d4d; font-weight: 500; min-height: 20px;
        }

        .footer-text { margin-top: 30px; font-size: 11px; color: #666; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="brand-logo">NeuroVibe AI</div>
        <span class="brand-subtext">TECHNOLOGIES PVT LTD</span>

        <form id="loginForm">
            <div class="input-group">
                <i class="fa-solid fa-user-shield"></i>
                <input type="text" id="user" placeholder="Username / Email" required autocomplete="off">
            </div>
            
            <div class="input-group">
                <i class="fa-solid fa-key"></i>
                <input type="password" id="pass" placeholder="Password" required>
            </div>

            <button type="submit" class="btn-login" id="loginBtn">AUTHORIZE ACCESS</button>
        </form>

        <div id="error-msg"></div>

        <div class="footer-text">
            INDUSTRIAL IOT ECOSYSTEM &copy; 2026
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const msg = document.getElementById('error-msg');
            const btn = document.getElementById('loginBtn');

            btn.innerText = "AUTHENTICATING...";
            btn.disabled = true;
            msg.innerText = "";

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ u, p })
                });

                const result = await response.json();

                if (response.ok && result.status === "success") {
                    msg.style.color = "#00ff88";
                    msg.innerText = "Access Granted! Redirecting...";
                    // Redirect based on backend response (Admin to admin.html, Client to dashboard.html)
                    setTimeout(() => {
                        window.location.href = result.redirect || "/admin.html"; 
                    }, 800);
                } else {
                    msg.innerText = result.message || "Unauthorized: Check Credentials";
                    btn.innerText = "AUTHORIZE ACCESS";
                    btn.disabled = false;
                }
            } catch (err) {
                msg.innerText = "Connection Failure: Check Server Status";
                btn.innerText = "AUTHORIZE ACCESS";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
