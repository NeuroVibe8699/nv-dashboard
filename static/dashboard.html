<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroVibe AI | Live Dashboard</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        :root { --blue: #00d2ff; --orange: #ff9933; --glass: rgba(255, 255, 255, 0.05); --text: #e2e8f0; }
        body { margin:0; font-family: 'Segoe UI', sans-serif; background: #0b0e14; color:var(--text); display:flex; height:100vh; overflow:hidden; }
        
        /* Glass Sidebar */
        .sidebar { width: 80px; background: rgba(15, 23, 42, 0.9); border-right: 1px solid rgba(255,255,255,0.1); display:flex; flex-direction:column; align-items:center; padding:30px 0; gap:40px; }
        .menu-item { font-size: 22px; cursor:pointer; opacity:0.5; transition:0.3s; }
        .menu-item:hover, .active { opacity:1; color: var(--blue); transform: scale(1.1); }

        /* Main Content */
        .main { flex:1; padding:30px; overflow-y:auto; background: radial-gradient(circle at top right, #1a2a6c33, #0b0e14); }
        .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:30px; border-bottom: 1px solid var(--glass); padding-bottom:15px; }
        .brand b { color:var(--blue); font-size:22px; letter-spacing:2px; }

        /* Selectors */
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        select { background: #161b22; border: 1px solid #30363d; color:white; padding:12px; border-radius:10px; cursor:pointer; width: 100%; }

        /* Metrics Grid */
        .grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:20px; }
        .card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); padding:25px; border-radius:20px; text-align:center; transition: 0.3s; }
        .card:hover { border-color: var(--blue); transform: translateY(-5px); }
        .card h3 { font-size:12px; color: var(--orange); margin:0; text-transform: uppercase; }
        .val { font-size:35px; font-weight:700; color: #fff; margin:15px 0; }
        .unit { font-size: 10px; color: #888; }

        /* AI Alert Popup */
        #alert-notif { display:none; background: #ef4444; color: white; padding: 15px 30px; border-radius: 50px; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); font-weight: bold; z-index: 1000; box-shadow: 0 0 20px rgba(239, 68, 68, 0.5); }
    </style>
</head>
<body>

    <div id="alert-notif">⚠️ CRITICAL: ANOMALY DETECTED BY AI</div>

    <div class="sidebar">
        <div class="menu-item active">🏠</div>
        <div class="menu-item">📊</div>
        <div class="menu-item">⚙️</div>
        <div class="menu-item" onclick="location.href='/login.html'">🔒</div>
    </div>

    <div class="main">
        <div class="header">
            <div class="brand"><b>NEUROVIBE AI</b><br><small style="color:var(--orange)">Industrial Monitoring Ecosystem</small></div>
            <div style="text-align: right;"><div style="color:#22c55e;">● SYSTEM LIVE</div></div>
        </div>

        <div class="controls">
            <select id="siteSelect"><option>Site-01: Main Plant</option></select>
            <select id="nodeSelect" onchange="fetchData()">
                <option value="NVS-1010">NVS-1010 (AI Driven)</option>
                <option value="NVS-1001">NVS-1001 (Standard)</option>
            </select>
        </div>

        <div class="grid">
            <div class="card"><h3>Velocity</h3><div class="val" id="v">--</div><span class="unit">mm/s</span></div>
            <div class="card"><h3>Acceleration</h3><div class="val" id="a">--</div><span class="unit">g (P-P)</span></div>
            <div class="card"><h3>Temperature</h3><div class="val" id="t">--</div><span class="unit">°C</span></div>
            <div class="card"><h3>RPM</h3><div class="val" id="r">--</div><span class="unit">Calculated</span></div>
            <div class="card"><h3>Ultrasound</h3><div class="val" id="u">--</div><span class="unit">dB</span></div>
        </div>

        <div style="margin-top:30px; background:var(--glass); padding:20px; border-radius:20px; height: 250px;">
            <canvas id="liveChart"></canvas>
        </div>
    </div>

    <script>
        async function fetchData() {
            const mac = document.getElementById('nodeSelect').value;
            try {
                // Fetch data from your NEW API that queries the DATABASE
                const res = await fetch(`/api/status?radio_mac=${mac}`);
                const d = await res.json();
                
                if(d && !d.message) {
                    document.getElementById('v').innerText = d.velocity || '--';
                    document.getElementById('a').innerText = d.acceleration || '--';
                    document.getElementById('t').innerText = d.temperature || '--';
                    document.getElementById('r').innerText = d.calculated_rpm || '1440';
                    document.getElementById('u').innerText = d.ultrasound_db || '--';
                    
                    // Show/Hide AI Alert
                    document.getElementById('alert-notif').style.display = d.ai_alert_status ? 'block' : 'none';
                }
            } catch (e) { console.log("Cloud sync error..."); }
        }

        // Auto-refresh every 5 seconds
        setInterval(fetchData, 5000);
        window.onload = fetchData;

        // Simple Chart Visualization
        const ctx = document.getElementById('liveChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: { labels: ['1s','2s','3s','4s','5s'], datasets: [{ label: 'Vibration Trend', data: [1.2, 1.5, 2.1, 1.8, 2.4], borderColor: '#00d2ff', tension: 0.4 }] },
            options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });
    </script>
</body>
</html>
