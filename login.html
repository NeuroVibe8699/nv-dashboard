<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NV Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0b0f1a] min-h-screen flex items-center justify-center p-6 text-white">
    <div class="bg-slate-900 p-10 rounded-[2rem] w-full max-w-md border border-white/10 shadow-2xl">
        <h2 class="text-2xl font-black mb-8 text-center text-sky-400 tracking-widest uppercase">Login</h2>
        <div class="space-y-6">
            <input type="email" id="email" placeholder="Email ID" class="w-full bg-black/40 border border-white/10 p-4 rounded-xl outline-none focus:border-sky-500">
            <input type="password" id="pass" placeholder="Password" class="w-full bg-black/40 border border-white/10 p-4 rounded-xl outline-none focus:border-sky-500">
            <button onclick="handleLogin()" class="w-full bg-sky-600 p-4 rounded-xl font-bold uppercase tracking-widest hover:bg-sky-500 transition shadow-lg">Sign In</button>
        </div>
    </div>
    <script>
        function handleLogin() {
            const email = document.getElementById('email').value.trim();
            if (email === 'admin@nv.com') {
                window.location.href = 'admin.html';
            } else if (email !== '') {
                window.location.href = 'User.html'; // matching your GitHub filename 'User.html'
            } else {
                alert("Please enter credentials!");
            }
        }
    </script>
</body>
</html>
