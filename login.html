<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Neurovibe | Portal Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 flex items-center justify-center min-h-screen text-white">
    <div class="bg-slate-900 p-12 rounded-[3rem] border border-slate-800 w-[400px] text-center shadow-2xl">
        <h2 class="text-2xl font-black mb-8 tracking-tighter uppercase">Client & Admin Login</h2>
        <div class="space-y-4">
            <input type="email" id="email" placeholder="Email Address" class="w-full bg-slate-950 border border-slate-700 p-4 rounded-2xl outline-none focus:border-orange-500">
            <input type="password" id="pass" placeholder="Password" class="w-full bg-slate-950 border border-slate-700 p-4 rounded-2xl outline-none focus:border-orange-500">
            <button onclick="auth()" class="w-full bg-[#FF9933] py-4 rounded-2xl font-black shadow-xl shadow-orange-500/20">ENTER PORTAL</button>
        </div>
    </div>
    <script>
        function auth() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            if(e === "admin@neurovibe.com" && p === "admin123") window.location.href = "/admin.html";
        }
    </script>
</body>
</html>
