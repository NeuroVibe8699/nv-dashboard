<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroVibe | Predictive Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0F1115; color: #FFFFFF; }
        .auth-card { background-color: #1E1F22; border-top: 4px solid #FF9933; border-radius: 1.5rem; }
        input { transition: all 0.3s ease; }
        input:focus { border-color: #FF9933 !important; box-shadow: 0 0 10px rgba(255, 153, 51, 0.2); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="auth-card p-10 shadow-2xl w-full max-w-md text-center">
        
        <h1 class="text-4xl font-black italic tracking-tighter">NEURO<span class="text-orange-500">VIBE</span></h1>
        <p class="text-[10px] text-gray-500 uppercase tracking-[0.4em] mt-2 font-bold">Predictive Control Access</p>

        <div class="mt-12 space-y-5">
            <!-- Email Input -->
            <div class="text-left">
                <label class="text-[10px] font-bold text-gray-600 uppercase ml-1">Access ID</label>
                <input type="email" id="email" placeholder="nvpredictive@gmail.com" 
                    class="w-full bg-black border border-gray-800 p-4 rounded-xl text-orange-500 outline-none text-sm mt-1">
            </div>
            
            <!-- Password Input -->
            <div class="text-left">
                <label class="text-[10px] font-bold text-gray-600 uppercase ml-1">Master Key</label>
                <input type="password" id="password" placeholder="••••••••" 
                    class="w-full bg-black border border-gray-800 p-4 rounded-xl text-orange-500 outline-none text-sm mt-1">
            </div>
            
            <!-- Action Buttons -->
            <button onclick="handleLogin()" id="loginBtn" 
                class="w-full bg-orange-600 hover:bg-orange-500 text-white font-black py-4 rounded-xl shadow-lg transition-all uppercase tracking-widest text-xs mt-4">
                Authorize Entry
            </button>

            <button onclick="handleReset()" 
                class="text-[9px] text-gray-600 hover:text-gray-400 uppercase font-bold tracking-widest transition-all mt-4">
                Forgot Master Key?
            </button>

            <!-- Status Indicator -->
            <p id="statusMsg" class="text-red-500 text-[10px] font-bold mt-6 uppercase tracking-tight h-4"></p>
        </div>
    </div>

    <!-- Firebase Integration -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com";
        import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com";

        // ✅ Confirmed NeuroVibe (eb945) Project Credentials
        const firebaseConfig = {
            apiKey: "AIzaSyCZJ7BAn2YrWsB1MC6TodhcZaahuINQSoc",
            authDomain: "neurovibe-eb945.firebaseapp.com",
            projectId: "neurovibe-eb945",
            appId: "1:833975927910:web:899592fa982a21c39099a7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Global function for Authorize Entry
        window.handleLogin = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const msg = document.getElementById('statusMsg');

            if(!email || !password) { 
                msg.innerText = "Error: Credentials Required"; 
                return; 
            }

            btn.innerText = "AUTHENTICATING...";
            msg.innerText = "";
            
            try {
                await signInWithEmailAndPassword(auth, email, password);
                // Redirect on success
                window.location.href = "admin.html";
            } catch (error) {
                // Formatting error codes for cleaner UI
                let cleanError = error.code.split('/')[1].replace(/-/g, ' ').toUpperCase();
                msg.innerText = "ACCESS DENIED: " + cleanError;
                btn.innerText = "AUTHORIZE ENTRY";
            }
        };

        // Global function for Password Reset
        window.handleReset = async () => {
            const email = document.getElementById('email').value;
            if(!email) { 
                alert("Please enter your Access ID first."); 
                return; 
            }
            try {
                await sendPasswordResetEmail(auth, email);
                alert("Authorization reset link dispatched to: " + email);
            } catch (error) {
                alert("Reset Failed: " + error.message);
            }
        };
    </script>
</body>
</html>
