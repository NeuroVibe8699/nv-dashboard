<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NV Login | Secure Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #080b14; color: white; font-family: sans-serif; }
        .glass-card { background: #111827; border: 1px solid #1f2937; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5); }
        .login-btn { background: #0ea5e9; transition: 0.3s; }
        .login-btn:hover { background: #0284c7; transform: scale(1.02); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="glass-card p-10 rounded-[2rem] w-full max-w-md border border-white/10">
        <div class="text-center mb-10">
            <h1 class="text-2xl font-black text-sky-400 tracking-widest uppercase">NV PREDICTIVE</h1>
            <p class="text-[10px] text-slate-500 mt-2 uppercase">Secure Access Portal</p>
        </div>

        <div class="space-y-6">
            <!-- Email Input -->
            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase ml-1 block mb-2">Email ID</label>
                <input type="email" id="email" placeholder="example@nv.com" 
                class="w-full bg-black border border-white/10 p-4 rounded-xl outline-none focus:border-sky-500 text-white">
            </div>

            <!-- Password Input -->
            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase ml-1 block mb-2">Password</label>
                <input type="password" id="pass" placeholder="••••••••" 
                class="w-full bg-black border border-white/10 p-4 rounded-xl outline-none focus:border-sky-500 text-white">
            </div>

            <!-- LOGIN BUTTON (साफ़ दिखने वाला) -->
            <button onclick="handleLogin()" 
            class="login-btn w-full p-4 rounded-xl font-black text-sm uppercase tracking-widest text-white shadow-lg mt-4">
                SIGN IN / LOGIN
            </button>

            <!-- Forgot Password -->
            <div class="text-center mt-4">
                <button onclick="handleForgot()" class="text-xs text-slate-500 hover:text-sky-400">Forgot Password?</button>
            </div>
        </div>
    </div>

    <script>
        function handleLogin() {
            const email = document.getElementById('email').value.trim();
            if (email === 'admin@nv.com') {
                window.location.href = 'admin.html'; // एडमिन पैनल पर ले जाएगा
            } else if (email !== '') {
                window.location.href = 'user.html'; // यूज़र डैशबोर्ड पर ले जाएगा
            } else {
                alert("Please enter your Email, Boss!");
            }
        }

        function handleForgot() {
            const id = prompt("Enter Email for OTP:");
            if(id) alert("OTP sent to " + id);
        }
    </script>
</body>
</html>
