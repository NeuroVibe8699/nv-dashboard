<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>NV Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background: #0b0f1a; color: white; }</style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="bg-slate-900 p-10 rounded-[2rem] w-full max-w-md border border-white/10">
        <h2 class="text-2xl font-black mb-8 text-center text-sky-400">LOGIN</h2>
        <div class="space-y-6">
            <input type="email" id="email" placeholder="Email ID" class="w-full bg-black/40 border border-white/10 p-4 rounded-xl outline-none focus:border-sky-500">
            <input type="password" id="pass" placeholder="Password" class="w-full bg-black/40 border border-white/10 p-4 rounded-xl outline-none focus:border-sky-500">
            <div class="flex justify-between text-xs">
                <button onclick="handleLogin()" class="bg-sky-600 px-8 py-3 rounded-xl font-bold uppercase">Login</button>
                <button onclick="handleForgot()" class="text-slate-400 hover:text-sky-400 mt-2">Forgot password?</button>
            </div>
        </div>
    </div>
    <script>
        function handleLogin() {
            const email = document.getElementById('email').value;
            if (email === 'admin@nv.com') window.location.href = 'admin.html';
            else window.location.href = 'user.html';
        }
        function handleForgot() {
            const id = prompt("Need Email ID for OTP:");
            if(id) alert("OTP sent to " + id + ". Write new password.");
        }
    </script>
</body>
</html>
