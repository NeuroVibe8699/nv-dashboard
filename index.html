<div style="text-align:center; margin-bottom:30px;">
    <h2 style="color:#ff9933; margin:0; font-family:'Orbitron';">NEUROVIBE AI</h2>
    <p style="color:#8b949e; font-size:10px; margin:5px 0;">Technologies Pvt Ltd</p>
</div>

<!-- Login Script -->
<script>
async function handleLogin() {
    const u = document.getElementById('username').value;
    const p = document.getElementById('password').value;
    
    // Bypass logic for testing
    if (u === "admin@neurovibe.com" && p === "admin123") {
        window.location.href = "dashboard.html";
        return;
    }

    try {
        const response = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: u, password: p })
        });
        if (response.ok) window.location.href = "dashboard.html";
        else document.getElementById('error').innerText = "Invalid Credentials";
    } catch (e) {
        // Agar backend offline bhi hai toh login allow kar do (Sirf testing ke liye)
        window.location.href = "dashboard.html"; 
    }
}
</script>
