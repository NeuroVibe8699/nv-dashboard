<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NV Predictive | Secure Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com" rel="stylesheet">
    <style>
        body { background: #080b14; color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        .glass-box { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(56, 189, 248, 0.1); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .input-glow:focus { border-color: #38bdf8; box-shadow: 0 0 15px rgba(56, 189, 248, 0.15); outline: none; }
        .btn-glow { background: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%); transition: 0.3s; }
        .btn-glow:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(37, 99, 235, 0.4); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative">

    <!-- Background Glow Decor -->
    <div class="absolute top-0 left-0 w-64 h-64 bg-sky-600/10 rounded-full blur-[100px]"></div>
    <div class="absolute bottom-0 right-0 w-64 h-64 bg-blue-600/10 rounded-full blur-[100px]"></div>

    <div class="glass-box p-8 md:p-12 rounded-[2.5rem] w-full max-w-md relative z-10">
        <!-- Logo Area -->
        <div class="text-center mb-10">
            <div class="w-16 h-16 bg-sky-500/10 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-sky-500/20">
                <i class="fas fa-microchip text-3xl text-sky-400"></i>
            </div>
            <h1 class="text-2xl font-black tracking-tighter uppercase text-white">NV Predictive</h1>
            <p class="text-[10px] text-slate-500 font-bold tracking-[0.2em] uppercase mt-1">Industrial Intelligence Portal</p>
        </div>

        <!-- Login Form -->
        <div class="space-y-5">
            <div class="relative">
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1 mb-2 block">Email Address</label>
                <i class="fas fa-at absolute left-4 top-[38px] text-slate-600 text-sm"></i>
                <input type="email" id="email" placeholder="name@company.com" class="w-full bg-black/40 border border-white/5 p-4 pl-12 rounded-2xl input-glow text-sm transition-all">
            </div>

            <div class="relative">
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1 mb-2 block">Secure Password</label>
                <i class="fas fa-lock absolute left-4 top-[38px] text-slate-600 text-sm"></i>
                <input type="password" id="pass" placeholder="••••••••" class="w-full bg-black/40 border border-white/5 p-4 pl-12 rounded-2xl input-glow text-sm transition-all">
            </div>

            <div class="flex items-center justify-between px-1">
                <label class="flex items-center text-[11px] text-slate-500 cursor-pointer select-none">
                    <input type="checkbox" class="mr-2 accent-sky-500"> Remember Session
                </label>
                <button onclick="handleForgot()" class="text-[11px] font-bold text-sky-400 hover:text-sky-300 transition">Forgot Key?</button>
            </div>

            <button onclick="handleLogin()" class="w-full btn-glow p-4 rounded-2xl font-black text-xs uppercase tracking-[0.2em] mt-4 shadow-lg shadow-sky-600/20">
                Verify & Enter <i class="fas fa-arrow-right ml-2 text-[10px]"></i>
            </button>
        </div>

        <p class="text-center text-[9px] text-slate-600 mt-10 font-bold uppercase tracking-widest">
            Predict.nvpredictive.com &copy; 2026 Internal Use
        </p>
    </div>

    <script>
        function handleLogin() {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('pass').value.trim();

            if (!email || !pass) {
                alert("Boss, please provide valid credentials!");
                return;
            }

            // Logic as per your requirement
            if (email === 'admin@nv.com') {
                window.location.href = 'admin.html';
            } else {
                // If it's a regular user created from Admin
                window.location.href = 'user.html';
            }
        }

        function handleForgot() {
            const id = prompt("Enter Registered Email ID for OTP Verification:");
            if(id) alert("A 6-digit OTP has been dispatched to " + id + ". Please verify to reset your key.");
        }
    </script>
</body>
</html>
