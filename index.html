<!-- NeuroVibe AI - Login Section -->
<div class="login-container" style="background: #1a1a1a; color: #FF9933; padding: 50px; border-radius: 15px; border: 2px solid #FF9933;">
    <h2 style="text-align: center;">NeuroVibe AI Login</h2>
    <form id="loginForm">
        <input type="text" id="username" placeholder="User ID" required style="width: 100%; margin-bottom: 10px; padding: 10px;">
        <input type="password" id="password" placeholder="Password" required style="width: 100%; margin-bottom: 20px; padding: 10px;">
        <button type="submit" style="background: #FF9933; color: white; width: 100%; padding: 12px; border: none; font-weight: bold; cursor: pointer;">
            CONNECT TO SYSTEM
        </button>
    </form>
</div>
