<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>NeuroVibe AI Dashboard</title>
</head>
<body class="bg-[#1A1A1D] text-white font-sans min-h-screen">
    <!-- Top Navigation -->
    <nav class="flex justify-between items-center p-6 border-b border-gray-800">
        <div class="text-3xl font-black italic">
            <span class="text-[#FF9933]">NEURO</span><span class="text-gray-400 font-normal">VIBE AI</span>
        </div>
        <div class="flex gap-4">
            <span class="bg-gray-800 px-4 py-2 rounded-full text-xs text-green-500 font-bold">GATEWAY: ONLINE</span>
        </div>
    </nav>
    <!-- Main Dashboard Section -->
    <main class="p-8 max-w-7xl mx-auto">
        <div class="bg-white/5 p-10 rounded-[3rem] mb-12 border border-white/10 text-center">
            <div class="flex justify-center gap-4 mb-6">
                <span class="bg-green-500/20 text-green-400 px-4 py-1 rounded-full text-sm">✔ ML and AI</span>
                <span class="bg-green-500/20 text-green-400 px-4 py-1 rounded-full text-sm">✔ IoT Sensors</span>
            </div>
            <h1 class="text-4xl font-bold mb-8 italic">NeuroVibe <span class="text-[#FF9933]">Risk Analysis</span></h1>
            <button class="bg-[#FF9933] text-white text-xl font-bold px-12 py-4 rounded-2xl shadow-[0_10px_30px_-5px_rgba(255,153,51,0.5)]">
                GET STARTED
            </button>
        </div>
        <div class="grid md:grid-cols-3 gap-8">
            <div class="bg-[#2D2D30] p-8 rounded-[2rem] border border-gray-700">
                <h3 class="text-gray-400 font-bold mb-6 text-sm">OVERALL RISK PROFILE</h3>
                <div class="w-40 h-40 rounded-full border-[15px] border-[#FF9933] border-t-gray-800 mx-auto flex items-center justify-center">
                    <span class="text-4xl font-black text-[#FF9933]">84%</span>
                </div>
            </div>
            <div class="col-span-2 bg-[#2D2D30] p-8 rounded-[2rem] border border-gray-700">
                <h3 class="text-gray-400 font-bold mb-6 text-sm">ASSET HEALTH MONITORING</h3>
                <div class="space-y-4">
                    <div class="flex justify-between items-center bg-black/20 p-4 rounded-xl border-l-4 border-[#FF9933]">
                        <span class="font-bold">Ammonia Pump #1</span>
                        <span class="text-[#FF9933] font-black">HIGH RISK</span>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
