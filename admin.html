<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>NeuroVibe | Master Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <style>body { background: #0F1115; color: white; }</style>
</head>
<body class="flex min-h-screen">
    <aside class="w-64 bg-gray-900 border-r border-gray-800 p-6 flex flex-col justify-between">
        <div>
            <h2 class="text-xl font-black text-orange-500 mb-10">MASTER ADMIN</h2>
            <nav class="space-y-4">
                <button class="w-full text-left p-3 bg-gray-800 rounded-lg"><i class="fas fa-warehouse mr-2"></i> Inventory</button>
                <button class="w-full text-left p-3 hover:bg-gray-800 rounded-lg"><i class="fas fa-users mr-2"></i> Client List</button>
                <button class="w-full text-left p-3 hover:bg-gray-800 rounded-lg"><i class="fas fa-exchange-alt mr-2"></i> Migrate Device</button>
            </nav>
        </div>
        <button onclick="location.href='index.html'" class="text-gray-500 text-xs uppercase font-bold">Logout System</button>
    </aside>
    <main class="flex-1 p-10">
        <h2 class="text-4xl font-black mb-10">Inventory <span class="text-orange-500">& Hardware Migration</span></h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-10">
            <!-- Provision Form -->
            <div class="bg-gray-900 p-8 rounded-2xl border border-gray-800">
                <h4 class="font-bold mb-4 uppercase text-sm">Assign Hardware to Client</h4>
                <select class="w-full bg-black p-3 rounded mb-4 text-orange-500 border border-gray-700"><option>Select Gateway (NV-G)</option></select>
                <select class="w-full bg-black p-3 rounded mb-4 text-orange-500 border border-gray-700"><option>Select Target Client</option></select>
                <button onclick="alert('Hardware Migrated Successfully')" class="w-full bg-orange-600 p-3 rounded-xl font-bold uppercase">Update Mapping</button>
            </div>
            <!-- Inventory Stats -->
            <div class="bg-gray-900 p-8 rounded-2xl border border-gray-800 text-center">
                <p class="text-gray-500 text-xs mb-2 uppercase">Global Hardware Pool</p>
                <div class="flex justify-around">
                    <div><h3 class="text-3xl font-black">12</h3><p class="text-[10px]">Gateways</p></div>
                    <div><h3 class="text-3xl font-black">45</h3><p class="text-[10px]">Sensors</p></div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
