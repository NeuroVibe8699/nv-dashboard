<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NV Admin | Live Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com" rel="stylesheet">
    <style>
        body { background: #0b0f1a; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(23, 32, 53, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .nav-btn { display: flex; align-items: center; gap: 12px; width: 100%; padding: 12px; border-radius: 12px; transition: 0.3s; color: #94a3b8; }
        .nav-btn:hover, .nav-btn.active { background: rgba(56, 189, 248, 0.1); color: #38bdf8; border-left: 4px solid #38bdf8; }
        .hidden { display: none; }
    </style>
</head>
<body class="flex min-h-screen">

    <!-- SIDEBAR (Menu Section as per PDF) -->
    <aside class="w-64 glass border-r border-white/5 p-6 space-y-8">
        <h1 class="text-xl font-black text-sky-400 tracking-tighter uppercase">NV Predictive</h1>
        <nav class="space-y-2">
            <button onclick="showTab('devices')" id="tab-devices" class="nav-btn active"><i class="fas fa-microchip"></i> Devices (Nodes)</button>
            <button onclick="showTab('inventory')" id="tab-inventory" class="nav-btn"><i class="fas fa-boxes"></i> Inventory</button>
            <button onclick="showTab('users')" id="tab-users" class="nav-btn"><i class="fas fa-user-shield"></i> User Management</button>
            <button onclick="showTab('ota')" id="tab-ota" class="nav-btn"><i class="fas fa-cloud-upload-alt"></i> OTA & Services</button>
        </nav>
    </aside>

    <!-- MAIN PANEL -->
    <main class="flex-1 p-10 overflow-y-auto">
        <header class="flex justify-between items-center mb-10">
            <h2 id="main-title" class="text-3xl font-bold">Gateway & Nodes List</h2>
            <div class="flex gap-4">
                <span class="bg-sky-500/10 text-sky-400 px-4 py-2 rounded-full text-xs font-bold border border-sky-500/20">LIVE: Predict.nvpredictive.com</span>
            </div>
        </header>

        <!-- 1. DEVICES SECTION (MAC ID, Site Name, Mapping Area) -->
        <section id="sec-devices">
            <div class="glass rounded-2xl overflow-hidden shadow-2xl">
                <table class="w-full text-left">
                    <thead class="bg-white/5 text-[10px] uppercase tracking-widest text-slate-400">
                        <tr><th class="p-5">MAC ID</th><th>Site Name</th><th>Mapping Area</th><th>Action</th></tr>
                    </thead>
                    <tbody class="text-sm">
                        <tr class="border-b border-white/5 hover:bg-white/5 transition">
                            <td class="p-5 font-mono text-sky-400">MV1001-A4:2B</td>
                            <td>Ammonia Pump</td>
                            <td>Production Area</td>
                            <td>
                                <button class="text-xs bg-slate-800 px-3 py-1 rounded hover:text-red-400">Delete</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <!-- 2. INVENTORY SECTION (Import/Export as per PDF) -->
        <section id="sec-inventory" class="hidden space-y-6">
            <div class="grid grid-cols-2 gap-6">
                <div class="glass p-8 rounded-2xl border-t-4 border-sky-500">
                    <h3 class="font-bold mb-4 uppercase text-xs text-sky-400">Gateway Inventory</h3>
                    <div class="flex gap-3">
                        <button class="flex-1 bg-sky-600 p-3 rounded-xl text-sm font-bold">Import Excel</button>
                        <button class="flex-1 bg-slate-800 p-3 rounded-xl text-sm font-bold">Export CSV</button>
                    </div>
                </div>
                <div class="glass p-8 rounded-2xl border-t-4 border-emerald-500">
                    <h3 class="font-bold mb-4 uppercase text-xs text-emerald-400">Node Inventory</h3>
                    <div class="flex gap-3">
                        <button class="flex-1 bg-emerald-600 p-3 rounded-xl text-sm font-bold">Upload Node Data</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- 3. USER MANAGEMENT (Sign Up Form as per PDF) -->
        <section id="sec-users" class="hidden max-w-md mx-auto">
            <div class="glass p-8 rounded-3xl shadow-2xl">
                <h3 class="text-xl font-bold mb-6 text-center">Create User / Client</h3>
                <div class="space-y-4">
                    <input type="email" placeholder="Email ID" class="w-full bg-black/40 border border-white/10 p-4 rounded-xl outline-none focus:border-sky-500">
                    <input type="password" placeholder="Write Password" class="w-full bg-black/40 border border-white/10 p-4 rounded-xl outline-none focus:border-sky-500">
                    <input type="password" placeholder="Confirm Password" class="w-full bg-black/40 border border-white/10 p-4 rounded-xl outline-none focus:border-sky-500">
                    <button class="w-full bg-sky-600 p-4 rounded-xl font-black tracking-widest hover:bg-sky-500 transition shadow-lg shadow-sky-600/30">SIGN UP / CREATE</button>
                </div>
            </div>
        </section>

        <!-- 4. OTA & SERVICES (Start, Stop, Firmware update) -->
        <section id="sec-ota" class="hidden">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="glass p-8 rounded-2xl">
                    <h3 class="font-bold mb-6 flex items-center gap-2"><i class="fas fa-tools"></i> Service Control</h3>
                    <div class="flex gap-4">
                        <button class="bg-emerald-500/20 text-emerald-400 px-6 py-2 rounded-lg font-bold">START</button>
                        <button class="bg-yellow-500/20 text-yellow-400 px-6 py-2 rounded-lg font-bold">PAUSE</button>
                        <button class="bg-red-500/20 text-red-400 px-6 py-2 rounded-lg font-bold">STOP</button>
                    </div>
                </div>
                <div class="glass p-8 rounded-2xl border-l-4 border-sky-500">
                    <h3 class="font-bold mb-4 uppercase text-xs">Firmware OTA (Update)</h3>
                    <p class="text-xs text-slate-400 mb-4">Select Node/Gateway to push latest firmware metadata.</p>
                    <button class="w-full bg-slate-800 p-3 rounded-lg text-xs font-bold border border-white/5">Check for Updates</button>
                </div>
            </div>
        </section>
    </main>

    <script>
        function showTab(tab) {
            // Hide all
            document.getElementById('sec-devices').classList.add('hidden');
            document.getElementById('sec-inventory').classList.add('hidden');
            document.getElementById('sec-users').classList.add('hidden');
            document.getElementById('sec-ota').classList.add('hidden');
            
            // Remove active styles
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));

            // Show selected
            document.getElementById('sec-' + tab).classList.remove('hidden');
            document.getElementById('tab-' + tab).classList.add('active');

            const titles = { 'devices': 'Gateway & Nodes List', 'inventory': 'Device Inventory Management', 'users': 'Create New Access', 'ota': 'OTA & System Services' };
            document.getElementById('main-title').innerText = titles[tab];
        }
    </script>
</body>
</html>
