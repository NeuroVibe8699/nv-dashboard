<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NV Predictive | Admin Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com" rel="stylesheet">
    <style>
        body { background: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .neon-border { border-left: 4px solid #38bdf8; }
    </style>
</head>
<body class="flex min-h-screen">

    <!-- Sidebar -->
    <div class="w-64 glass p-6 hidden md:block">
        <h1 class="text-2xl font-bold text-sky-400 mb-10">NV Admin</h1>
        <nav class="space-y-4">
            <a href="#" class="flex items-center space-x-3 p-3 bg-sky-500/10 rounded-lg text-sky-400 neon-border">
                <i class="fas fa-chart-line"></i> <span>Dashboard</span>
            </a>
            <a href="#" class="flex items-center space-x-3 p-3 hover:bg-slate-800 rounded-lg transition">
                <i class="fas fa-users"></i> <span>Users</span>
            </a>
            <a href="#" class="flex items-center space-x-3 p-3 hover:bg-slate-800 rounded-lg transition">
                <i class="fas fa-cog"></i> <span>Settings</span>
            </a>
        </nav>
    </div>

    <!-- Main Content -->
    <main class="flex-1 p-8">
        <header class="flex justify-between items-center mb-8">
            <h2 class="text-3xl font-bold">Welcome Back, Boss</h2>
            <div class="flex items-center space-x-4">
                <span class="bg-green-500/20 text-green-400 px-3 py-1 rounded-full text-sm font-semibold">● System Active</span>
                <img src="https://ui-avatars.com" class="w-10 h-10 rounded-full border-2 border-sky-500">
            </div>
        </header>

        <!-- Stats Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="glass p-6 rounded-2xl shadow-xl">
                <p class="text-slate-400 text-sm">Total Predictions</p>
                <h3 class="text-4xl font-bold mt-2">12.4K</h3>
                <p class="text-green-400 text-sm mt-2">↑ 14% vs last week</p>
            </div>
            <div class="glass p-6 rounded-2xl shadow-xl">
                <p class="text-slate-400 text-sm">Active Users</p>
                <h3 class="text-4xl font-bold mt-2">854</h3>
                <p class="text-sky-400 text-sm mt-2">Currently Online</p>
            </div>
            <div class="glass p-6 rounded-2xl shadow-xl">
                <p class="text-slate-400 text-sm">System Health</p>
                <h3 class="text-4xl font-bold mt-2 text-green-400">99.9%</h3>
                <p class="text-slate-400 text-sm mt-2">Optimized</p>
            </div>
        </div>

        <!-- Placeholder Table -->
        <div class="glass rounded-2xl p-6">
            <h3 class="text-xl font-semibold mb-4">Recent Activity</h3>
            <div class="border-t border-slate-700 pt-4 text-slate-400 text-center py-10">
                🚀 No data yet. Your predictions will appear here!
            </div>
        </div>
    </main>

</body>
</html>
