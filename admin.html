<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroVibe AI | Enterprise Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 🚩 Google Charts for 100% working graph -->
    <script type="text/javascript" src="https://www.gstatic.com"></script>
    <link href="https://cdnjs.cloudflare.com" rel="stylesheet">
    <style>
        :root { --saffron: #FF9933; --teal: #2DD4BF; --navy: #0f172a; }
        body { background: #ffffff; color: var(--navy); font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        .glass-3d { background: white; border-radius: 1.5rem; border: 1px solid #f1f5f9; box-shadow: 10px 10px 30px #d1d9e6, -10px -10px 30px #ffffff; }
        .chart-container { background: #0f172a; border-radius: 2rem; box-shadow: 0 20px 40px rgba(0,0,0,0.3); overflow: hidden; min-height: 320px; }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        @media (min-width: 768px) { .stats-grid { grid-template-columns: repeat(6, 1fr); } }
    </style>
</head>
<body class="p-4 md:p-10">

    <!-- Header Section (Fixed Logo) -->
    <header class="flex flex-col items-center mb-10 text-center">
        <img src="https://i.ibb.co" alt="" class="w-24 h-24 mb-4 object-contain">
        <h1 class="text-2xl font-black tracking-tighter uppercase leading-none">NEUROVIBE <span class="text-teal-500 italic">AI</span></h1>
        <p class="text-[9px] font-bold text-slate-400 uppercase tracking-[4px] mt-2">Technologies Pvt Ltd</p>
    </header>

    <main class="max-w-7xl mx-auto space-y-8">
        
        <div class="flex justify-between items-center px-2">
            <h2 class="text-[10px] font-black italic text-slate-800 uppercase tracking-[2px]">Live Asset Monitor</h2>
            <span class="text-[9px] font-black text-green-500 animate-pulse uppercase"><i class="fas fa-circle mr-2"></i> System Online</span>
        </div>

        <!-- 6 Params (Flux, RPM, etc.) -->
        <div class="stats-grid">
            <div class="glass-3d p-5 text-center border-t-4 border-t-[#FF9933]"><p class="text-[9px] font-bold text-slate-400 uppercase">Flux</p><p class="text-lg font-black">125μT</p></div>
            <div class="glass-3d p-5 text-center border-t-4 border-t-teal-400"><p class="text-[9px] font-bold text-slate-400 uppercase">RPM</p><p class="text-lg font-black">1450</p></div>
            <div class="glass-3d p-5 text-center border-t-4 border-t-slate-200"><p class="text-[9px] font-bold text-slate-400 uppercase">Temp</p><p class="text-lg font-black">42°C</p></div>
            <div class="glass-3d p-5 text-center border-t-4 border-t-slate-200"><p class="text-[9px] font-bold text-slate-400 uppercase">Velocity</p><p class="text-lg font-black">4.5mm/s</p></div>
            <div class="glass-3d p-5 text-center border-t-4 border-t-slate-200"><p class="text-[9px] font-bold text-slate-400 uppercase">Accel</p><p class="text-lg font-black">1.2g</p></div>
            <div class="glass-3d p-5 text-center border-t-4 border-t-slate-200"><p class="text-[9px] font-bold text-slate-400 uppercase">Ultra</p><p class="text-lg font-black">22kHz</p></div>
        </div>

        <!-- Fixed Working Spectrum Graph -->
        <div class="chart-container p-8">
            <h3 class="text-[#FF9933] font-black text-[10px] uppercase tracking-[3px] mb-6 italic">Deep-Scan Spectrum Analysis (Live)</h3>
            <div id="chart_div" style="width: 100%; height: 260px;"></div>
        </div>

        <!-- Risk Profile -->
        <div class="glass-3d overflow-hidden">
            <table class="w-full text-left text-[11px] font-bold">
                <tr class="bg-slate-50 border-b border-slate-100 text-slate-400 uppercase text-[9px]"><th class="p-4">Machine</th><th class="p-4">Risk</th><th class="p-4">Last Sync</th></tr>
                <tr><td class="p-4">Ammonia Pump #1</td><td class="p-4 text-red-500 font-black">CRITICAL (85%)</td><td class="p-4 text-slate-400">2m ago</td></tr>
            </table>
        </div>
    </main>

    <script type="text/javascript">
        google.charts.load('current', {'packages':['corechart']});
        google.charts.setOnLoadCallback(drawChart);
        function drawChart() {
            var data = google.visualization.arrayToDataTable([
                ['Time', 'Vibration (g)'], ['1pm', 1.2], ['2pm', 1.8], ['3pm', 1.4], ['4pm', 2.3], ['5pm', 1.9], ['6pm', 1.6]
            ]);
            var options = {
                backgroundColor: 'transparent', colors: ['#FF9933'], legend: { position: 'none' },
                vAxis: { textStyle: { color: '#475569', fontSize: 10 }, gridlines: { color: '#1e293b' } },
                hAxis: { textStyle: { color: '#475569', fontSize: 10 }, gridlines: { display: false } },
                chartArea: { width: '90%', height: '80%' }, lineWidth: 4, curveType: 'function'
            };
            var chart = new google.visualization.LineChart(document.getElementById('chart_div'));
            chart.draw(data, options);
        }
    </script>
</body>
</html>
