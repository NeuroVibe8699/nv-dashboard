<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NeuroVibe Admin | Inventory</title>
    <style>
        body { background: #0d1117; color: white; font-family: sans-serif; padding: 20px; }
        .card { background: #161b22; border: 1px solid #ff9933; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        button { background: #4facfe; border: none; padding: 10px 20px; color: white; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Inventory & Provisioning</h1>
    
    <div class="card">
        <h3>1. Gateway/Node Inventory (Excel Import)</h3>
        <p style="font-size: 10px; color: gray;">SR NO | MODEL | IMEI | RADIO MAC | BLE MAC</p>
        <input type="file" id="excelFile">
        <button onclick="alert('Uploading Excel...')">Upload Inventory</button>
    </div>

    <div class="card">
        <h3>2. Provisioning Protocol (Token Generation)</h3>
        <input type="text" placeholder="Enter Device MAC ID">
        <button onclick="alert('Provisioning Token Generated!')">ASK TOKEN NO</button>
    </div>
    
    <a href="dashboard.html" style="color: #4facfe;">Back to Live Dashboard</a>
</body>
</html>
