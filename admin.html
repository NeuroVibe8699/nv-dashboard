<!-- NeuroVibe AI - Admin Control Center -->
<div style="background: #1a1a1a; color: #FF9933; padding: 30px; font-family: sans-serif;">
    <h2 style="border-bottom: 2px solid #FF9933;">NeuroVibe Admin: NV-8699</h2>

    <!-- Section 1: User Management -->
    <div style="margin-top: 30px; background: #262626; padding: 20px; border-radius: 10px;">
        <h4>1. Create New Client User</h4>
        <input type="text" id="new_user" placeholder="Client Name" style="padding: 10px; width: 200px;">
        <input type="password" id="new_pass" placeholder="Password" style="padding: 10px; width: 200px;">
        <button onclick="createUser()" style="background: #FF9933; border: none; padding: 10px 20px; cursor: pointer;">ADD USER</button>
    </div>

    <!-- Section 2: Gateway Provisioning (Inventory) -->
    <div style="margin-top: 20px; background: #262626; padding: 20px; border-radius: 10px;">
        <h4>2. Provision New Gateway</h4>
        <input type="text" id="gw_id" placeholder="Gateway ID (e.g. GW_8699)" style="padding: 10px; width: 200px;">
        <button onclick="provisionGW()" style="background: #FF9933; border: none; padding: 10px 20px; cursor: pointer;">REGISTER GATEWAY</button>
    </div>

    <!-- Section 3: System Health & OTA -->
    <div style="margin-top: 20px; background: #262626; padding: 20px; border-radius: 10px;">
        <h4>3. Firmware OTA Update</h4>
        <p>Current Version: v1.0.2</p>
        <button onclick="triggerOTA()" style="background: #e60000; color: white; border: none; padding: 12px 25px; cursor: pointer; font-weight: bold;">
            PUSH UPDATE TO ALL NODES (OTA)
        </button>
    </div>
</div>

<script>
    // Frontend logic to call Backend APIs (Flask)
    function provisionGW() {
        const id = document.getElementById('gw_id').value;
        fetch('https://predict.nvpredictive.com', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ gateway_id: id })
        }).then(res => alert('Gateway Registered!'));
    }
</script>
