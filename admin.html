<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin | Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com" rel="stylesheet">
    <style>.hidden { display: none; } .active { color: #38bdf8; border-left: 4px solid #38bdf8; background: rgba(56,189,248,0.1); }</style>
</head>
<body class="flex bg-[#0b0f1a] text-slate-300 min-h-screen">
    <aside class="w-64 border-r border-white/10 p-6 space-y-4">
        <h1 class="text-sky-400 font-black mb-10 text-lg">NV ADMIN</h1>
        <nav class="space-y-2">
            <button onclick="tab('device')" id="b-device" class="active w-full text-left p-3 rounded-lg"><i class="fas fa-microchip mr-2"></i> Devices</button>
            <button onclick="tab('invent')" id="b-invent" class="w-full text-left p-3 rounded-lg"><i class="fas fa-boxes mr-2"></i> Inventory</button>
            <button onclick="tab('user')" id="b-user" class="w-full text-left p-3 rounded-lg"><i class="fas fa-user-plus mr-2"></i> Create User</button>
            <button onclick="tab('ota')" id="b-ota" class="w-full text-left p-3 rounded-lg"><i class="fas fa-sync mr-2"></i> OTA Service</button>
        </nav>
    </aside>
    <main class="flex-1 p-10">
        <div id="s-device">
            <h2 class="text-xl font-bold mb-6 uppercase">Gateway Devices List</h2>
            <table class="w-full text-sm">
                <thead class="border-b border-white/5 text-slate-500 uppercase">
                    <tr><th class="pb-4">MAC ID</th><th class="pb-4">Site Name</th><th class="pb-4">Area</th><th class="pb-4 text-right">Action</th></tr>
                </thead>
                <tbody>
                    <tr class="border-b border-white/5 hover:bg-white/5"><td class="py-4 text-sky-400 font-mono">MV1001-A4</td><td>Ammonia Pump</td><td>Production</td><td class="text-right"><button class="text-red-400 text-xs">DELETE</button></td></tr>
                </tbody>
            </table>
        </div>
        <div id="s-invent" class="hidden grid grid-cols-2 gap-6">
            <div class="p-6 bg-white/5 rounded-2xl border border-white/10">
                <h3 class="text-sky-400 font-bold mb-4">GATEWAY INVENTORY</h3>
                <button onclick="alert('Importing...')" class="w-full bg-slate-800 p-3 rounded mb-2 text-sm">Import Inventor Gateway</button>
                <button onclick="alert('Exporting...')" class="w-full bg-slate-800 p-3 rounded text-sm">Export Inventor Gateway</button>
            </div>
            <div class="p-6 bg-white/5 rounded-2xl border border-white/10">
                <h3 class="text-emerald-400 font-bold mb-4">NODE INVENTORY</h3>
                <button onclick="alert('Importing...')" class="w-full bg-slate-800 p-3 rounded mb-2 text-sm">Import Inventor Node</button>
                <button onclick="alert('Exporting...')" class="w-full bg-slate-800 p-3 rounded text-sm">Export Inventor Node</button>
            </div>
        </div>
        <div id="s-user" class="hidden max-w-sm mx-auto p-10 bg-white/5 rounded-3xl border border-white/10">
            <h3 class="font-bold mb-6 text-center">User Sign Up</h3>
            <div class="space-y-4">
                <input type="email" placeholder="Email ID" class="w-full bg-black p-3 rounded-lg outline-none"><input type="password" placeholder="Password" class="w-full bg-black p-3 rounded-lg outline-none"><button class="w-full bg-sky-600 p-3 rounded-lg font-bold">CREATE</button>
            </div>
        </div>
        <div id="s-ota" class="hidden space-y-6">
            <div class="p-8 bg-white/5 rounded-2xl border-l-4 border-red-500 flex gap-4">
                <button class="bg-emerald-600 px-6 py-2 rounded font-bold">START</button><button class="bg-red-600 px-6 py-2 rounded font-bold">STOP</button>
            </div>
            <div class="p-8 bg-white/5 rounded-2xl border-l-4 border-sky-500">
                <h3 class="font-bold mb-4">Firmware Update</h3>
                <button onclick="alert('Checking OTA...')" class="bg-sky-600 px-6 py-2 rounded font-bold">Check Firmware by OTA</button>
            </div>
        </div>
    </main>
    <script>
        function tab(t) {
            ['device','invent','user','ota'].forEach(i => { document.getElementById('s-'+i).classList.add('hidden'); document.getElementById('b-'+i).classList.remove('active'); });
            document.getElementById('s-'+t).classList.remove('hidden'); document.getElementById('b-'+t).classList.add('active');
        }
    </script>
</body>
</html>
