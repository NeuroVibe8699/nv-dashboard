<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Neurovibe AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net"></script>
    <link href="https://cdnjs.cloudflare.com" rel="stylesheet">
    <style>
        body { background: #f8fafc; color: #1e293b; font-family: 'Inter', sans-serif; }
        .glass-3d { background: white; border: 1px solid #e2e8f0; border-radius: 2rem; box-shadow: 20px 20px 60px #d1d9e6, -20px -20px 60px #ffffff; }
        .nav-active { background: #FF9933 !important; color: white !important; box-shadow: 0 10px 20px rgba(255, 153, 51, 0.3); }
        .tab-content { display: none; }
        .active-tab { display: block; }
    </style>
</head>
<body class="flex min-h-screen p-6">

    <!-- Sidebar -->
    <aside class="w-80 glass-3d p-8 flex flex-col fixed h-[95vh] z-50">
        <h1 class="text-xl font-black italic mb-12">NEUROVIBE <span class="text-[#FF9933]">AI</span></h1>
        <nav class="space-y-4 flex-1">
            <button onclick="tab('dash', this)" class="w-full text-left p-4 rounded-2xl font-bold text-xs nav-active">DASHBOARD (P2)</button>
            <button onclick="tab('config', this)" class="w-full text-left p-4 rounded-2xl font-bold text-xs text-slate-400">CONFIG (P1)</button>
            <button onclick="tab('inventory', this)" class="w-full text-left p-4 rounded-2xl font-bold text-xs text-slate-400">INVENTORY (P3)</button>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="ml-88 w-full pl-80">
        
        <!-- P2 Dashboard: Stats & Graph -->
        <section id="dash" class="tab-content active-tab space-y-8">
            <h2 class="text-4xl font-black tracking-tighter">Live Intelligence</h2>
            <div class="grid grid-cols-2 lg:grid-cols-6 gap-4">
                <div class="glass-3d p-6 text-center border-t-4 border-t-[#FF9933]"><p class="text-[10px] font-black text-slate-400 uppercase">Flux</p><p class="text-2xl font-black">125μT</p></div>
                <div class="glass-3d p-6 text-center border-t-4 border-t-teal-500"><p class="text-[10px] font-black text-slate-400 uppercase">RPM</p><p class="text-2xl font-black">1450</p></div>
                <!-- ... other cards ... -->
            </div>
            <div class="glass-3d p-10"><canvas id="liveChart" height="100"></canvas></div>
        </section>

        <!-- P1: Device Configuration -->
        <section id="config" class="tab-content space-y-8">
            <h2 class="text-4xl font-black tracking-tighter">System Configuration</h2>
            <div class="glass-3d p-10 lg:w-1/2">
                <h3 class="font-bold text-xs uppercase tracking-widest text-[#FF9933] mb-6">Create New Partner Access</h3>
                <div class="space-y-4">
                    <input type="email" placeholder="Corporate Email" class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl">
                    <input type="password" placeholder="Access Password" class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl">
                    <button class="w-full bg-[#FF9933] text-white font-black py-4 rounded-2xl shadow-xl">AUTHENTICATE</button>
                </div>
            </div>
        </section>

    </main>

    <script>
        function tab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
            document.querySelectorAll('button').forEach(b => b.classList.remove('nav-active'));
            document.getElementById(id).classList.add('active-tab');
            btn.classList.add('nav-active');
        }
        const ctx = document.getElementById('liveChart').getContext('2d');
        new Chart(ctx, { type: 'line', data: { labels: ['1pm','2pm','3pm','4pm'], datasets: [{ label: 'Vibration', data:, borderColor: '#FF9933', borderWidth: 5, tension: 0.4, fill: true, backgroundColor: 'rgba(255, 153, 51, 0.05)' }] } });
    </script>
</body>
</html>
