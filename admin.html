<!-- Add this inside your admin.html Content Area -->
<section id="security-manager" class="mt-12">
    <h3 class="text-2xl font-black mb-6 flex items-center text-orange-500">
        <i class="fas fa-user-shield mr-3"></i> Security & Access Manager
    </h3>
    
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
        <!-- Password Reset Form -->
        <div class="bg-gray-900 p-8 rounded-2xl border border-gray-800 shadow-xl">
            <h4 class="font-bold mb-4 uppercase text-xs tracking-widest text-gray-400 italic">Reset Client Access Key</h4>
            <div class="space-y-4">
                <input type="text" id="reset-userid" placeholder="Enter Client Site ID (e.g. client01)" class="w-full bg-black p-4 border border-gray-800 rounded-xl text-orange-500 outline-none text-sm">
                <input type="password" id="new-client-pass" placeholder="Set New System Key" class="w-full bg-black p-4 border border-gray-800 rounded-xl text-orange-500 outline-none text-sm">
                <button onclick="resetPassword()" class="w-full bg-gradient-to-r from-orange-500 to-red-600 p-4 rounded-xl font-black uppercase tracking-widest text-white shadow-lg hover:scale-105 transition-transform text-xs">
                    Authorize Password Overwrite
                </button>
            </div>
        </div>

        <!-- System Log for Changes -->
        <div class="bg-gray-900 p-8 rounded-2xl border border-gray-800 flex flex-col justify-between">
            <div>
                <h4 class="font-bold mb-4 uppercase text-[10px] tracking-[0.3em] text-gray-500">Access Protocols</h4>
                <p class="text-xs text-gray-400 italic leading-relaxed">
                    "Admin override enabled. Changing a password here will immediately revoke old access from the selected Client Site ID."
                </p>
            </div>
            <div class="mt-6 p-3 bg-black/40 border-l-2 border-orange-500 rounded text-[10px] font-mono text-orange-500">
                LATEST LOG: Admin initialized password reset sequence...
            </div>
        </div>
    </div>
</section>

<script>
    function resetPassword() {
        const u = document.getElementById('reset-userid').value;
        const p = document.getElementById('new-client-pass').value;
        
        if(u && p) {
            alert("PROTOCOL SUCCESS: Access Key for " + u + " has been updated to: " + p);
            console.log("System Log: Password changed for " + u);
        } else {
            alert("ERROR: Please enter both Site ID and New Password.");
        }
    }
</script>
