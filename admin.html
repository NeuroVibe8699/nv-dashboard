<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | NeuroVibe Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net"></script>
    <link href="https://cdnjs.cloudflare.com" rel="stylesheet">
    <style>
        :root { --saffron: #FF9933; --deep: #0f172a; }
        body { background: #ffffff; color: var(--deep); font-family: 'Inter', sans-serif; }
        .glass-3d { background: white; border: 1px solid #e2e8f0; border-radius: 2.5rem; box-shadow: 15px 15px 40px #d1d9e6, -15px -15px 40px #ffffff; }
        .tab-content { display: none; }
        .tab-active { display: block; animation: fadeIn 0.4s ease; }
        .nav-btn.active { background: var(--saffron) !important; color: white !important; box-shadow: 0 10px 20px rgba(255, 153, 51, 0.3); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="flex min-h-screen p-6">

    <!-- Sidebar (PDF Navigation) -->
    <aside class="w-80 glass-3d p-8 flex flex-col fixed h-[94vh] z-50">
        <h1 class="text-xl font-black italic mb-12 uppercase tracking-tighter">NeuroVibe <span class="text-[#FF9933]">Admin</span></h1>
        <nav class="space-y-4 flex-1">
            <button onclick="setTab('dash', this)" class="nav-btn active w-full text-left p-4 rounded-2xl font-black text-xs uppercase tracking-widest"><i class="fas fa-layer-group mr-3"></i> Dashboard (P2)</button>
            <button onclick="setTab('config', this)" class="nav-btn w-full text-left p-4 rounded-2xl font-black text-xs text-slate-400 uppercase tracking-widest"><i class="fas fa-microchip mr-3"></i> Config (P1)</button>
            <button onclick="setTab('system', this)" class="nav-btn w-full text-left p-4 rounded-2xl font-black text-xs text-slate-400 uppercase tracking-widest"><i class="fas fa-shield-halved mr-3"></i> Protocols (P3)</button>
        </nav>
        <a href="/" class="p-4 text-red-500 font-black text-xs uppercase tracking-widest flex items-center justify-center"><i class="fas fa-sign-out mr-3"></i> Logout</a>
    </aside>

    <!-- Main Section -->
    <main class="ml-88 w-full pl-80">
        
        <!-- P2 Dashboard Section -->
        <section id="dash" class="tab-content tab-active space-y-8">
            <h2 class="text-4xl font-black tracking-tighter italic">Operational Center</h2>
            <div class="grid grid-cols-2 lg:grid-cols-6 gap-4">
                <!-- Parameters from PDF -->
                <div class="glass-3d p-6 text-center border-t-4 border-t-[#FF9933]"><p class="text-[10px] font-black text-slate-400">FLUX</p><p class="text-xl font-black">125μT</p></div>
                <div class="glass-3d p-6 text-center border-t-4 border-t-teal-500"><p class="text-[10px] font-black text-slate-400">RPM</p><p class="text-xl font-black">1450</p></div>
                <!-- ... add other 4 parameters here ... -->
            </div>
            <div class="glass-3d p-10"><canvas id="adminChart" height="100"></canvas></div>
        </section>

        <!-- P1 Config Section -->
        <section id="config" class="tab-content space-y-8">
            <h2 class="text-4xl font-black tracking-tighter italic">Configuration (P1)</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="glass-3d p-8">
                    <h3 class="font-black text-xs uppercase tracking-widest text-[#FF9933] mb-6">Create New Partner</h3>
                    <input type="email" placeholder="Partner Email" class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl mb-4 outline-none">
                    <button class="w-full bg-slate-900 text-white font-black py-4 rounded-2xl shadow-xl">AUTHENTICATE</button>
                </div>
            </div>
        </section>

    </main>

    <script>
        function setTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('tab-active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('tab-active');
            btn.classList.add('active');
        }
    </script>
</body>
</html>
