<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NeuroVibe AI | Enterprise Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net"></script>
    <link href="https://cdnjs.cloudflare.com" rel="stylesheet">
    <style>
        :root { --saffron: #FF9933; --teal: #2DD4BF; --navy: #0f172a; --silver: #f1f5f9; }
        body { background: #ffffff; color: var(--navy); font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        
        /* 3D Glass Effect */
        .glass-3d {
            background: white;
            border-radius: 2rem;
            border: 1.5px solid #f1f5f9;
            box-shadow: 15px 15px 40px #d1d9e6, -10px -10px 40px #ffffff;
            transition: 0.3s ease;
        }

        /* Chart Area Styling */
        .chart-container {
            background: #0f172a;
            border-radius: 2.5rem;
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
        }

        /* Navigation Fix */
        .tab-content { display: none; }
        .tab-active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        /* Grid for Mobile */
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        @media (min-width: 768px) { .stats-grid { grid-template-columns: repeat(6, 1fr); } }

        /* Clean Logo Styling (No Alt Text overlap) */
        .logo-box { width: 110px; height: 110px; object-fit: contain; }
    </style>
</head>
<body class="p-4 md:p-10">

    <!-- Header Section (Fixed Spacing & Logo) -->
    <header class="flex flex-col items-center justify-center mb-12 space-y-4">
        <!-- 🚩 Logo Fixed: Removed 'alt' text that was appearing on top -->
        <img src="https://i.ibb.co" alt="" class="logo-box">
        
        <div class="text-center">
            <h1 class="text-2xl font-black tracking-tighter uppercase leading-none">NEUROVIBE <span class="text-teal-500 italic">AI</span></h1>
            <p class="text-[9px] font-bold text-slate-400 uppercase tracking-[4px] mt-2">Technologies Pvt Ltd</p>
        </div>
    </header>

    <main class="max-w-7xl mx-auto space-y-8">
        
        <!-- Dashboard Header -->
        <div class="flex justify-between items-center px-2">
            <h2 class="text-xs font-black italic text-slate-800 uppercase tracking-[2px]">Live Asset Monitor</h2>
            <div class="flex items-center space-x-2">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                <span class="text-[9px] font-bold text-green-600 uppercase">System Live</span>
            </div>
        </div>

        <!-- 6 Data Points (PDF Logic: Flux, RPM, etc.) -->
        <div class="stats-grid">
            <div class="glass-3d p-6 text-center border-t-4 border-t-[#FF9933]">
                <p class="text-[9px] font-black text-slate-400 uppercase mb-1">Flux</p>
                <p class="text-xl font-black">125 <span class="text-xs">μT</span></p>
            </div>
            <div class="glass-3d p-6 text-center border-t-4 border-t-teal-400">
                <p class="text-[9px] font-black text-slate-400 uppercase mb-1">RPM</p>
                <p class="text-xl font-black">1450</p>
            </div>
            <div class="glass-3d p-6 text-center border-t-4 border-t-slate-200">
                <p class="text-[9px] font-black text-slate-400 uppercase mb-1">Temp</p>
                <p class="text-xl font-black">42°C</p>
            </div>
            <div class="glass-3d p-6 text-center border-t-4 border-t-slate-200">
                <p class="text-[9px] font-black text-slate-400 uppercase mb-1">Velocity</p>
                <p class="text-xl font-black">4.5<span class="text-xs">mm/s</span></p>
            </div>
            <div class="glass-3d p-6 text-center border-t-4 border-t-slate-200">
                <p class="text-[9px] font-black text-slate-400 uppercase mb-1">Accel</p>
                <p class="text-xl font-black">1.2g</p>
            </div>
            <div class="glass-3d p-6 text-center border-t-4 border-t-slate-200">
                <p class="text-[9px] font-black text-slate-400 uppercase mb-1">Ultra</p>
                <p class="text-xl font-black">22kHz</p>
            </div>
        </div>

        <!-- Live Spectrum Chart -->
        <div class="chart-container p-8 md:p-12">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-[#FF9933] font-black text-[10px] uppercase tracking-[3px] italic">Deep-Scan Spectrum Analysis (Live)</h3>
                <span class="text-[9px] font-bold text-slate-500">NODE ID: NV-PF4</span>
            </div>
            <div class="h-64 md:h-80">
                <canvas id="liveChart"></canvas>
            </div>
        </div>

        <!-- Bottom Asset Risk Profile -->
        <div class="glass-3d overflow-hidden">
            <div class="bg-slate-50 p-4 border-b border-slate-100">
                <h4 class="text-[10px] font-black uppercase tracking-widest text-slate-400">Active Asset Risk Profile</h4>
            </div>
            <table class="w-full text-left text-[11px] font-bold">
                <tr class="bg-white">
                    <td class="p-5">Ammonia Pump #1</td>
                    <td class="p-5 text-red-500 font-black">CRITICAL (85%)</td>
                    <td class="p-5 text-slate-400 font-medium">2m ago</td>
                </tr>
            </table>
        </div>
    </main>

    <script>
        const ctx = document.getElementById('liveChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['09:00', '10:00', '11:00', '12:00', '13:00', '14:00'],
                datasets: [{
                    label: 'Vibration Level',
                    data: [1.2, 1.4, 1.2, 1.8, 1.5, 1.3],
                    borderColor: '#FF9933',
                    borderWidth: 6,
                    tension: 0.4,
                    fill: true,
                    backgroundColor: (context) => {
                        const bg = context.chart.ctx.createLinearGradient(0, 0, 0, 400);
                        bg.addColorStop(0, 'rgba(255, 153, 51, 0.1)');
                        bg.addColorStop(1, 'rgba(255, 153, 51, 0)');
                        return bg;
                    },
                    pointRadius: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { 
                    y: { border: { display: false }, grid: { color: '#1e293b' }, ticks: { color: '#475569', font: { weight: 'bold' } } },
                    x: { border: { display: false }, grid: { display: false }, ticks: { color: '#475569', font: { weight: 'bold' } } }
                }
            }
        });
    </script>
</body>
</html>
