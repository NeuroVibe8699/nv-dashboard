<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>User Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net"></script>
    <style>body { background: #0b0f1a; color: white; }</style>
</head>
<body class="p-10">
    <header class="flex justify-between items-center mb-10 border-b border-white/10 pb-6">
        <div>
            <h1 class="text-2xl font-black text-sky-400">USER DASHBOARD</h1>
            <p class="text-[10px] text-slate-500">Company Name: NV Predictive | Site: Ammonia Pump</p>
        </div>
        <div class="flex gap-4">
            <select class="bg-slate-800 p-2 rounded text-xs"><option>Select Site Name</option></select>
            <select class="bg-slate-800 p-2 rounded text-xs"><option>Select Node ID (10012)</option></select>
        </div>
    </header>

    <!-- Data Points Card (Acceleration, Velocity, Flux, etc. - Page 2) -->
    <div class="grid grid-cols-6 gap-4 mb-10">
        <div class="bg-white/5 p-4 rounded-xl border-l-4 border-sky-500"><p class="text-[10px] text-slate-400">ACCELERATION</p><h4 class="text-lg font-bold">0.8g</h4></div>
        <div class="bg-white/5 p-4 rounded-xl border-l-4 border-emerald-500"><p class="text-[10px] text-slate-400">VELOCITY</p><h4 class="text-lg font-bold">4.2mm/s</h4></div>
        <div class="bg-white/5 p-4 rounded-xl border-l-4 border-yellow-500"><p class="text-[10px] text-slate-400">FLUX</p><h4 class="text-lg font-bold">120mW</h4></div>
        <div class="bg-white/5 p-4 rounded-xl border-l-4 border-purple-500"><p class="text-[10px] text-slate-400">ULTRASOUND</p><h4 class="text-lg font-bold">30dB</h4></div>
        <div class="bg-white/5 p-4 rounded-xl border-l-4 border-red-500"><p class="text-[10px] text-slate-400">TEMP</p><h4 class="text-lg font-bold">45°C</h4></div>
        <div class="bg-white/5 p-4 rounded-xl border-l-4 border-cyan-500"><p class="text-[10px] text-slate-400">RPM</p><h4 class="text-lg font-bold">1450</h4></div>
    </div>

    <!-- Live Graph Always Show Section -->
    <div class="grid grid-cols-3 gap-10">
        <div class="col-span-2 bg-white/5 p-8 rounded-3xl">
            <h3 class="font-bold mb-6 uppercase text-sm">Graph (Always Show)</h3>
            <canvas id="myChart" height="120"></canvas>
        </div>
        <div class="bg-white/5 p-8 rounded-3xl border-t-4 border-red-500">
            <h3 class="font-bold mb-6 uppercase text-sm text-red-400 underline">Alert Show</h3>
            <div class="p-3 bg-red-500/10 rounded-lg text-[10px] text-slate-400">Node detected High Velocity at Site: Production Area.</div>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('myChart');
        new Chart(ctx, {
            type: 'line',
            data: { labels: ['1pm','2pm','3pm','4pm','5pm'], datasets: [{ label: 'Live Data', data: [12, 19, 13, 15, 12], borderColor: '#0ea5e9', tension: 0.4 }] },
            options: { scales: { y: { beginAtZero: true } } }
        });
    </script>
</body>
</html>
