<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NeuroVibe AI Technologies Pvt Ltd</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        :root { --blue: #4facfe; --orange: #ff9933; --bg: #0d1117; --card: #161b22; }
        body { margin:0; font-family: sans-serif; background:var(--bg); color:white; padding:12px; }
        .header { display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid var(--orange); padding-bottom:8px; margin-bottom:15px; }
        .grid { display:grid; grid-template-columns:repeat(3, 1fr); gap:8px; margin-bottom:15px; }
        .box { background:var(--card); border:1px solid #334155; padding:15px; border-radius:10px; text-align:center; }
        .val { font-size:22px; font-weight:bold; color:var(--blue); }
        .unit { font-size:9px; color:var(--orange); display:block; font-weight:bold; }
        .admin-card { background:var(--card); border:1px solid var(--orange); padding:15px; border-radius:12px; }
        button { background:var(--blue); color:white; border:none; padding:8px; border-radius:6px; cursor:pointer; font-weight:bold; }
        select, input { background:#0d1117; border:1px solid #334155; color:white; padding:8px; width:100%; border-radius:6px; margin-top:5px; font-size:11px; }
    </style>
</head>
<body>

    <div class="header">
        <div><b style="color:var(--blue); font-size:14px;">NEUROVIBE AI</b><br><small style="color:var(--orange); font-size:8px; font-weight:bold;">Technologies Pvt Ltd</small></div>
        <div id="st" style="color:#ff9933; font-size:10px; font-weight:bold;">● CONNECTING...</div>
    </div>

    <!-- Live Metrics Grid -->
    <div class="grid">
        <div class="box"><h3>Velocity</h3><div class="val" id="v">0.0</div><span class="unit">MM/S</span></div>
        <div class="box"><h3>Acceleration</h3><div class="val" id="a">0.0</div><span class="unit">G</span></div>
        <div class="box"><h3>Temperature</h3><div class="val" id="t">0.0</div><span class="unit">°C</span></div>
        <div class="box"><h3>Mag. Flux</h3><div class="val" id="f">0.0</div><span class="unit">T</span></div>
        <div class="box"><h3>Max RPM</h3><div class="val" id="r">0</div><span class="unit">RPM</span></div>
        <div class="box"><h3>Ultrasound</h3><div class="val" id="u">0.0</div><span class="unit">DB</span></div>
    </div>

    <!-- ADMIN: INVENTORY & PROVISIONING -->
    <div class="admin-card">
        <h3 style="color:var(--orange); font-size:12px; margin-top:0;">ADMIN: INVENTORY & PROVISIONING</h3>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
            <div>
                <p style="font-size:9px; color:#4facfe;">1. INVENTORY (GATEWAY / NODE COLUMNS)</p>
                <select id="type"><option>UPLOAD FOR GATEWAY</option><option>UPLOAD FOR NODE</option></select>
                <input type="file" style="font-size:10px;">
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <button style="flex:1;">IMPORT</button>
                    <button style="flex:1; background:var(--orange);" onclick="window.location.href='/api/export-inventory'">EXPORT ALL</button>
                </div>
            </div>
            <div>
                <p style="font-size:9px; color:var(--orange);">2. PROVISIONING (UNKNOWN MAC? DISCOVER)</p>
                <select id="disc"><option value="">Scanning for new devices...</option><option>NV-NEW-DISC-01 (Gateway)</option></select>
                <input type="text" id="manualMac" placeholder="OR Enter MAC ID Manually">
                <!-- DYNAMIC TOKEN BUTTON -->
                <button style="width:100%; margin-top:10px;" onclick="askNewToken()">ASK TOKEN NO</button>
            </div>
        </div>
    </div>

    <script>
        // Live Data Sync
        async function sync() {
            try {
                const res = await fetch('/api/status');
                const d = await res.json();
                document.getElementById('v').innerText = d.metrics.velocity;
                document.getElementById('a').innerText = d.metrics.acceleration;
                document.getElementById('t').innerText = d.metrics.temp;
                document.getElementById('f').innerText = d.metrics.flux;
                document.getElementById('r').innerText = d.metrics.rpm;
                document.getElementById('u').innerText = d.metrics.ultrasound;
                document.getElementById('st').innerText = "● ONLINE"; document.getElementById('st').style.color = "#00ff00";
            } catch (e) { document.getElementById('st').innerText = "● CONNECTING..."; }
        }

        // Dynamic Token Logic
        async function askNewToken() {
            try {
                const res = await fetch('/api/get-token');
                const data = await res.json();
                alert("New Provisioning Token: " + data.token);
            } catch (e) {
                // Offline fallback
                const fallback = "NV-" + Math.floor(1000 + Math.random() * 9000);
                alert("New Token Generated: " + fallback);
            }
        }

        setInterval(sync, 2000);
    </script>
</body>
</html>
